# Pinned DISA STIG XCCDF zips for the sysctld-W02 baseline drift check.
#
# DISA versions each RHEL STIG by FILENAME (there is no releases/latest API like
# ComplianceAsCode has), so a bump = edit the `zip` filename below, then run
# `stig-update derive --product <p>`, review the diff, update
# crates/rulesteward-sysctld/src/lints/baseline.rs (the RHEL*_BASELINE tables),
# re-gate (adversarial + mutation), and confirm `stig-update check` reports 0
# drift. Mirrors tools/sshd-stig-update/stig-refs.toml and
# tools/auditd-stig-update/stig-refs.toml exactly (#512 ports this tool from
# ComplianceAsCode to the same DISA XCCDF source those two tools already use;
# all three sysctld/sshd/auditd baselines are drawn from the same three
# benchmark documents, so a STIG bump updates all three tools' pins together).
#
# The public, no-auth CDN. Full URL = base_url + "/" + products.<p>.zip.
# (public.cyber.mil/stigs/downloads/ is a JavaScript SPA that curl cannot read;
# dl.dod.cyber.mil is the machine-fetchable path.)
base_url = "https://dl.dod.cyber.mil/wp-content/uploads/stigs/zip"

# Per-product pinned zip. The three RHEL STIGs version INDEPENDENTLY, so each has
# its own pinned filename and can be bumped on its own.
[products.rhel8]
zip = "U_RHEL_8_V2R8_STIG.zip"
benchmark = "RHEL 8 STIG V2R8 (01 Jul 2026)"

[products.rhel9]
zip = "U_RHEL_9_V2R9_STIG.zip"
benchmark = "RHEL 9 STIG V2R9 (01 Jul 2026)"

[products.rhel10]
zip = "U_RHEL_10_V1R2_STIG.zip"
benchmark = "RHEL 10 STIG V1R2 (01 Jul 2026)"
