# Pinned upstream fapolicyd git tags/commits + fetched-source sha256 for
# tools/fapolicyd-attr-update.
#
# Keyed by upstream fapolicyd VERSION (matching
# crates/rulesteward-fapolicyd/src/version.rs's `TargetVersion::fapolicyd_version()`
# strings), NOT by RHEL target - rhel9 and rhel10 currently pin the same fapolicyd
# version (1.4.5), so keying by version avoids fetching + checking the identical
# source twice.
#
# Repo: github.com/linux-application-whitelisting/fapolicyd . Both tags below were
# confirmed (via the GitHub tags + recursive git-tree API, 2026-07-10 grounding
# recon for #479) to carry `src/library/{subject,object}-attr.c` at the IDENTICAL
# path - no file move between the two pinned versions.
#
# Update workflow: bump a version's `tag`/`commit` below when
# `TargetVersion::fapolicyd_version()` changes for a RHEL target, or when upstream
# tags a new fapolicyd point release that touches
# `src/library/{subject,object}-attr.c`. Then run `fapolicyd-attr-update derive`,
# review the diff, update `crates/rulesteward-fapolicyd/src/attrs.rs`, re-copy
# `tests/fixtures/<version>/*.c`, and re-verify `fapolicyd-attr-update check`
# reports 0 drift.
#
# NOTE on TOML layout: a version like "1.3.2" is not a bare TOML key (dots would
# nest it as `versions.1.3.2` -> three levels), so each version is a QUOTED key:
# `[versions."1.3.2"]`.

