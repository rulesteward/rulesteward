[package]
name = "rulesteward-cli"
description = "Top-level rulesteward CLI binary."
version.workspace = true
edition.workspace = true
license.workspace = true
repository.workspace = true
homepage.workspace = true
rust-version.workspace = true

[lib]
name = "rulesteward_cli"
path = "src/lib.rs"

[[bin]]
name = "rulesteward"
path = "src/main.rs"

[dependencies]
rulesteward-core = { workspace = true }
rulesteward-fapolicyd = { workspace = true }
clap = { workspace = true }
ariadne = { workspace = true }
serde = { workspace = true }
serde_json = { workspace = true }
serde-sarif = { workspace = true }
clap_complete = { workspace = true }
thiserror = { workspace = true }
anyhow = "1"

[dev-dependencies]
assert_cmd = { workspace = true }
boon = { workspace = true }
heed = { workspace = true }
predicates = { workspace = true }
proptest = { workspace = true }
tempfile = { workspace = true }
# Enable the fapolicyd crate's `test-fixtures` feature for dev/test builds only,
# so e2e tests can call `write_trustdb_fixture_kv` to build trust-DB-shaped LMDB
# fixtures. The feature is off in the shipped binary (the non-dev dependency at
# the top of this file does not enable it), so this never leaks into release.
rulesteward-fapolicyd = { workspace = true, features = ["test-fixtures"] }

[lints]
workspace = true
