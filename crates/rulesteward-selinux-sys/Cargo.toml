[package]
name = "rulesteward-selinux-sys"
description = "libsepol FFI shim for RuleSteward (statically links libsepol 3.10; #106/#107)."
version.workspace = true
edition.workspace = true
license.workspace = true
repository.workspace = true
homepage.workspace = true
rust-version.workspace = true
# Cargo enforces a single link of the native `sepol` library across the graph and
# runs build.rs (which emits `rustc-link-lib=static=sepol` against the committed
# musl-built libsepol.a). See build.rs for the archive provenance + the
# single-archive-serves-glibc-and-musl note.
links = "sepol"
build = "build.rs"

[dependencies]
thiserror = { workspace = true }

[lints]
workspace = true
