# Trap: ChallengeResponseAuthentication was renamed to KbdInteractiveAuthentication
# in OpenSSH 8.7 (openssh.org/txt/release-8.7: "retain the old name as a
# deprecated alias"). On Rocky 8/9/10 the daemon parses it cleanly (exit 0,
# no "Deprecated option" message), but it is an upstream-deprecated alias that
# should steer the operator toward the canonical spelling. Fires sshd-W04.
# Source: sshd-stig-version-grounding.md section 3, [VM] 2026-06-15T02:23Z.
ChallengeResponseAuthentication yes
