# TRAP: ClientAliveInterval exceeds the STIG ceiling of 600.
# RHEL8 V2R4 V-244525 / RHEL9 V2R7 V-257996 / RHEL10 V1R1 V-281296:
# "ClientAliveInterval must be set to 600 or less."
# Value 900 is a common admin default that violates the STIG.
# W02 must fire (under default target=None, floor baseline applies).
ClientAliveInterval 900
