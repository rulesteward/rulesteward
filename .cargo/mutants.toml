    #   failure, never a silent gate shrink): sepol_compute_av_reason_buffer
    #   returns 0 on success and negative only on hard failure (vendor
    #   services.c), so rc>0 never occurs and the swap only re-routes an
    #   unreachable arm.
    'selinux-sys/src/lib\.rs:533:.*replace < with > in Policy::replay',
    # - Drop -> () (line 552): pure in-process leak of the sidtab htable +
    #   policydb; unobservable by a functional test (PR #170 precedent).
    'selinux-sys/src/lib\.rs:.*replace <impl Drop for Policy>::drop with \(\)',
    # sshd lints (#149): Wave C completed w05/w06 (and F02's lint_drop_in landed),
    # so ALL sshd- passes (e01-e04, w01-w06) are implemented; none is a Phase-0
    # `Vec::new()` stub anymore. The prior `replace (w05|w06) -> Vec<Diagnostic>
    # with vec![]` exclusion was removed here: that mutant is now REAL and is caught
    # by the w05/w06 fire tests (an empty return fails every "fires" assertion). Per
    # the wave protocol, each wave removes its fn from this alternation when it
    # implements the pass; Wave C is the last, so no sshd empty-return exclusion
    # remains.
    # sshd_config tokenizer (#149/#374/#387): the argument tokenizer was historically
    # `while chars.peek().is_some() { read_arg(...)?; skip_whitespace(...); }`, which
    # delegated cursor advancement to helpers. A `cargo mutants` body/return
    # replacement that made a helper STOP advancing (`skip_whitespace -> ()`,
    # `read_arg -> Ok(String::new())` / `Ok("xyzzy")`) pinned the shared `chars`
    # cursor, so the outer `while` spun and pushed tokens forever -> unbounded Vec ->
    # OOM runner-kill (nightly runs #84/#85 shards 12/17/18, then again post-#377 as
    # #387). Those three OOM mutants USED to be excluded here.
    #
    # In #374/#387 the arg loop was rewritten as a single
    # `while let Some(c) = chars.next()` consuming state machine (faithful `argv_split`
    # single+double quoting / escapes). `chars.next()` is in the loop HEADER, so every
    # iteration advances by construction: no body/return mutant can create an infinite
    # loop, ELIMINATING the OOM class rather than excluding it (the parse_criteria
    # precedent). Consequently all three exclusions were REMOVED:
    #   * `read_arg` was deleted -> its two mutants no longer exist.
    #   * `skip_whitespace` now runs only at the keyword/`=` boundary (never in a
    #     re-entrant loop), where `skip_whitespace -> ()` is CAUGHT by
    #     `tokenize_line_consumes_equals_keyword_separator` (`MaxAuthTries = 4` no
    #     longer consumes the spaced `=`). A real elimination + a real kill beat
    #     exclusions.
    # sudoers `short_hostname` (#334): reads `/proc/sys/kernel/hostname` (or the
    # HOSTNAME env) for the `@include ... %h` escape. Its return is the live host's
    # name, which varies by machine, so no unit test can pin it; a mutant returning
    # "" / "xyzzy" still resolves a `%h` include to a (almost-certainly-missing)
    # path that surfaces a Malformed - no observable test failure. Same I/O-without-
    # a-unit-seam rationale as the LiveProbe shell-outs above. The `%h` EXPANSION
    # logic IS fully tested: `expand_host_escape` has direct unit tests (separator
    # `/`->`_`, multi-`%h`, no-`%h`) and `resolve_target_with_host` exercises an
    # injected hostname end-to-end, so the substitution itself stays in the gate.
    'replace short_hostname -> String',
    'delete ! in short_hostname',
    # sshd-W07 (#302/#403) overlap oracle: genuine-equivalent / defensive-only /
    # non-terminating survivors from the post-GREEN adversarial loop. The
    # negation-aware + intersection overlap logic is otherwise fully killed by the w07
    # tests. After the #432 split, the passes and the shared glob/CIDR toolkit live
    # under lints/structural/ (w07.rs + matching.rs), so these anchors name the NEW
    # files (function-anchored, not line-anchored).
    # - name_instances_have_common_witness candidate filter `&&`->`||` (now w07.rs):
    #   with `||`, wildcard/empty strings get ADDED as candidate names, but the
    #   {listed-literals + FRESH-sentinel} witness set is COMPLETE (any real common
    #   witness is a listed literal or the fresh sentinel), so the extra candidates
    #   only ever move the already-accepted wildcard-vs-wildcard false negative, never
    #   a pinned result. (The identical filter in pattern_lists_overlap IS killed by
    #   wildcard_vs_wildcard_is_an_accepted_fn_is_clean; in name_instances the analogous
    #   killer is entangled with the matches-nobody verdict, so it stays an exclusion.)
    'w07\.rs:.*replace && with \|\| in name_instances_have_common_witness',
    # - glob_match `star_p + 1` -> `star_p * 1` (== star_p), now matching.rs: re-enters
    #   the `*` branch one iteration later and reaches the IDENTICAL (p, v, star,
    #   star_v) state; divergence would require value[v]=='*', but W07 candidate names
    #   never contain '*' (wildcard literals are stripped from candidates; the FRESH
    #   sentinel has none). Equivalent for every reachable input. Operator-specific so
    #   it never masks the KILLABLE `+`->`-` at the same site, nor a `+`->`*` in
    #   another crate's glob_match.
    'matching\.rs:.*replace \+ with \* in glob_match',
    # - glob_advance (matching.rs): the extracted one-line cursor bump `i + 1` that the
    #   three NON-TERMINATING glob_match advances (the `*`-open, backtrack, and
    #   trailing-`*` sites) now call. Function-anchoring RETIRES the old line-anchored
    #   907/910/917 exclusion class, which drifted whenever structural.rs shifted (the
    #   #431 churn). Three of glob_advance's mutants no-op the cursor, so the enclosing
    #   `while`/backtrack never terminates -- a hang that hits the per-mutant timeout
    #   floor rather than producing a wrong answer, and a hang cannot be killed by an
    #   assertion:
    #     `+`->`*` (i*1 == i); `-> usize with 0`; `-> usize with 1` (both constant, so
    #     the cursor never moves -- e.g. pattern `a*` vs `ab` loops forever).
    #   The OPERATOR/VALUE-SPECIFIC anchors below exclude ONLY those three. The fourth
    #   glob_advance mutant, `+`->`-` (i-1), is KILLABLE (usize underflow panic / a
    #   cursor that walks backward yields a wrong verdict) and MUST stay in the gate,
    #   so a broad `.*in glob_advance` is deliberately NOT used. The char-match-branch
    #   `+= with *=` mutants (the literal `p += 1` / `v += 1` still inline in glob_match,
    #   NOT moved into glob_advance) terminate -- the sibling counter advances -- and
    #   are caught by the W07 witness tests, so they stay in the gate untouched.
    'matching\.rs:.*replace \+ with \* in glob_advance',
    'matching\.rs:.*replace glob_advance -> usize with 0',
    'matching\.rs:.*replace glob_advance -> usize with 1',
    # - parse_negated_port_list body replacements (vec![] / vec![0] / vec![1]), now
    #   matching.rs: negated (and comma-list) `Match LocalPort` is sshd-INVALID
    #   (`a2port` rejects it, rc 255), so no sshd-loadable config ever yields a negated
    #   port. This parser is defensive only for rulesteward's lenient parse of an
    #   invalid config and is unreachable on any valid config, so no valid-config test
    #   can kill it (the invalid-config tests were removed as mis-grounded).
    'matching\.rs:.*replace parse_negated_port_list -> Vec<u32> with',
    # - cidr_split `| -> ^` (v4 line ~327 + v6 line ~335, both "in cidr_split"): the
    #   high half SETS the top host bit of a NETWORK address, whose host bits are 0 by
    #   construction, so `addr | bit` == `addr ^ bit` (setting a 0 bit equals toggling
    #   it) for every value the helper receives from a proper CIDR. They differ only on
    #   a malformed host-bits-set address, where the bisection is ill-defined AND every
    #   downstream consumer (`cidr_contains` / `cidr_intersects`) masks to the prefix and
    #   discards the low host bits entirely -- so the choice can never change a lint
    #   verdict. Genuine equivalent (#409). The KILLABLE `|`->`&`, `<<`->`>>`, and
    #   `128-child` arithmetic mutants at the SAME sites ARE in the gate (killed by the
    #   exact-halves `cidr_split` known-answer tests), so this operator-specific anchor
    #   never masks them.
    'matching\.rs:.*replace \| with \^ in cidr_split',
    # - region_shadow `delete match arm "localport"`: routes LocalPort to the block-level
    #   fallback instead of `port_region_shadow`. A VALID `Match LocalPort` is a SINGLETON
    #   (`a2port` rejects comma-lists and negation, rc 255), so a single-port block's
    #   "region" is one port and per-region reasoning reduces to block-level first-setter
    #   equality: `port_region_shadow` and `block_level_shadow` return the IDENTICAL
    #   verdict on every sshd-valid config (pinned by
    #   `single_localport_region_reduces_to_block_level_w07`). Genuine equivalent (#409).
    'w07\.rs:.*delete match arm "localport" in region_shadow',
    # - cidr_contains `<= -> >` (matching.rs): inverting the prefix-length comparison
    #   makes `cidr_minus_one`'s sibling-split recursion never reach its "hole is
    #   contained" base case, so the mutant does NOT terminate -> cargo-mutants TIMEOUT
    #   (the hang in a `cidr_set_difference` test races ahead of the direct
    #   `cidr_contains` known-answer test in the same binary, so it cannot be converted
    #   to a CAUGHT assertion). Detection-by-non-termination, not a silent survivor;
    #   analogous to the `glob_advance` non-terminating exclusions above. The KILLABLE
    #   `cidr_contains` mutants (the `&&`, and returning a constant) stay in-gate, killed
    #   by the `cidr_contains` known-answer test.
    'matching\.rs:.*replace <= with > in cidr_contains',
    # `eq_sentinel_relational_disjoint` (compare.rs, #475 class 3): two GENUINE
    # equivalent mutants that arise from a domain constraint. The uid/gid/sessionid
    # sentinel IS u32::MAX (4294967295), and a CONCRETE relational bound `p` caps at
    # 4294967294 because u32::MAX itself folds to the sentinel (classify -> UidGidUnset,
    # position() None -> the helper declines before `p` is used). So `p` is always in
    # [0, 4294967294], strictly below the sentinel.
    # - `Lt`'s `p - 1` -> `p / 1` (== p): for Lt the upper bound is `p - 1`; the mutant
    #   makes it `p`. The disjoint test `hi < SENTINEL` is `(p-1) < 4294967295` vs
    #   `p < 4294967295`; both are true for every reachable p (they could only differ at
    #   p == 4294967295, which is unreachable - it folds to the sentinel). Behaviourally
    #   identical. (The sibling `- with +` mutant IS killable and stays in-gate, caught by
    #   `sentinel_lt_tight_seam_one_below_sentinel_is_disjoint_class3_475` at p=4294967294.)
    # - `hi < SENTINEL_POSITION` -> `hi <= SENTINEL_POSITION`: differs only when
    #   `hi == 4294967295`. `hi` is `p` (Le) or `p - 1` (Lt); reaching 4294967295 needs
    #   p == u32::MAX (Le, folds/declined) or p == u32::MAX+1 (Lt, outside the u32 domain).
    #   Unreachable -> equivalent. Excluded by name (function-anchored), not
    #   `#[mutants::skip]`, so the rationale stays in reviewable config; a single `<`/`-`
    #   remains in the function after the dead Ge/Gt branches were dropped, so these
    #   operator-anchored patterns are unambiguous.
    'replace - with / in eq_sentinel_relational_disjoint',
    'replace < with <= in eq_sentinel_relational_disjoint',
    # `w12` (fapolicyd lints/deprecation.rs, #191) is DORMANT BY CONSTRUCTION: its
    # version gate `deprecates_untrusted_dir` is a constant `false` until a
    # fapolicyd-1.6-capable TargetVersion variant exists, so the real body already
    # returns an empty vec for EVERY input and `replace w12 -> vec![]` is
    # observationally identical. The detection logic is deliberately split out as
    # `w12_detect` (fully in scope, killed by its direct unit tests) precisely
    # because routing tests through the dormant gate would be vacuous - see the
    # doc comments on `w12` / `deprecates_untrusted_dir`. Verified 2026-07-18:
    # with the mutant applied, all 848 rulesteward-fapolicyd + 934 rulesteward-cli
    # tests pass (nightly runs 29475873945/29559182563/29633112455 each reported
    # exactly this one MISSED). The `vec![Default::default()]` sibling and the
    # `delete !` gate mutant stay IN scope (the gate flip is killed by the frozen
    # `w12_is_dormant_for_every_current_target` pin). Path-anchored because `w12`
    # is a generic lint-fn name. REMOVE THIS EXCLUSION when
    # `deprecates_untrusted_dir` flips: the mutant stops being equivalent the
    # moment the lint can fire.
    'rulesteward-fapolicyd/src/lints/deprecation\.rs:.*replace w12 -> Vec<Diagnostic> with vec!\[\]',
    # `find_selinuxtype` (selinux config.rs, #520) line-skip guard:
    # `trimmed.is_empty() || trimmed.starts_with('#')`. The `|| -> &&` mutant makes
    # the guard never fire (an empty string cannot start with '#'), so empty and
    # comment lines fall through - but an empty line fails the 12-byte
    # `SELINUXTYPE=` tag slice (`get(..12)` returns None -> continue) and a
    # '#'-leading line can never match the tag anchored at position 0
    # (case-insensitive compare starts at '#' vs 'S'), so `winner` is unchanged on
    # every input. Same separator-skip-is-an-optimisation shape as the
    # parse_fanotify_denials / parse_audit_event exclusions above. Verified
    # 2026-07-18: with the mutant applied, all 183 rulesteward-selinux + 934
    # rulesteward-cli tests pass (nightly run 29633112455 shard 3 reported exactly
    # this one MISSED). The sibling `||` mutant in `right_trim_selinuxtype_value`
    # stays IN scope (caught in the same nightly).
    'replace \|\| with && in find_selinuxtype',
]

# Per-mutant TEST timeout floor (seconds), NOT the per-shard job timeout (that is
# `timeout-minutes` in mutants.yml). cargo-mutants auto-sets the per-mutant test
# timeout to max(this floor, baseline_test_time x multiplier); the floor binds here.
#
# The nightly gate runs `--test-workspace true`, so EVERY mutant re-runs the entire
# workspace suite (unit + proptest + insta). That takes ~100-110s/mutant, which
# exceeded the old 90s floor -> cargo-mutants killed every mutant as a false TIMEOUT
# (exit 3) before it could be evaluated, so all 8 shards failed without testing a
# single mutant. Raise the floor to 180s: comfortably above the observed
# workspace-suite duration (with headroom for proptest variance / runner load),
# while still bounding a genuinely hung mutant.
minimum_test_timeout = 180.0
