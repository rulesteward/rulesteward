    'selinux-sys/src/lib\.rs:.*replace \+ with \* in Policy::replay',
    # - `delete !` on the reason_buf free guard (line 530): the inverted guard
    #   calls free(NULL) (a C no-op) and leaks the real buffer; no in-process
