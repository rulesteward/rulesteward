# cargo-mutants configuration - scope mutation testing to parser + lints + sink.
#
# Mutation testing is run against crates that contain business logic:
#   * rulesteward-core (Diagnostic type)
#   * rulesteward-fapolicyd (parser + lint walker)
#   * rulesteward-sink (Event schema + EventSink trait + NDJSON sinks)
#
# Excludes:
#   * format.rs (Display impls - mutation-noise heavy; the round-trip proptest
#     property catches semantic regressions there but cargo-mutants would
#     emit many low-signal "delete this whitespace" candidates).
#   * ast.rs (type definitions only; no behavioral methods to mutate).
#   * rulesteward-cli: mechanical glue (arg parsing, dispatch, format selection,
#     exit-code mapping) whose paths are covered by end-to-end assert_cmd tests
#     in tests/e2e_lint.rs. EXCEPTION: the pure trust-DB diff/stale computations
#     in commands/trustdb_compute.rs ARE real algorithms (path-grouping, multiset
#     value comparison, stale filtering), extracted out of the I/O orchestration
#     precisely so they can be unit-tested against exact output and mutation-gated;
#     they are in scope. The orchestration in commands/fapolicyd.rs + the
#     Display-style renderers in output/trustdb.rs stay excluded (e2e-covered;
#     render mutations are low-signal, same rationale as format.rs).
#   * rulesteward-auditd, -selinux, -license: stub crates.
#   * every test file (mutating tests is meaningless).

examine_globs = [
    "crates/rulesteward-core/src/diagnostic.rs",
    "crates/rulesteward-fapolicyd/src/parser/**/*.rs",
    "crates/rulesteward-fapolicyd/src/lints/**/*.rs",
    "crates/rulesteward-fapolicyd/src/attrs.rs",
    "crates/rulesteward-fapolicyd/src/trustdb.rs",
    # pure rule-evaluator core (P0.4 #67): explain replay + future simulate engine.
    "crates/rulesteward-fapolicyd/src/evaluate.rs",
    "crates/rulesteward-fapolicyd/src/facts.rs",
    # P1 explain domain logic (filled by pipeline P1): FANOTIFY record parser + replay/explain.
    # Top-level src files, NOT under parser/** or lints/**, so they must be listed explicitly
    # or the P1 mutation gate passes vacuously (examine_globs is an allowlist).
    "crates/rulesteward-fapolicyd/src/fanotify.rs",
    "crates/rulesteward-fapolicyd/src/explain.rs",
    # P0 (v0.2 round 2) frozen register contract: canonical_grant_key is real
    # AST-equality logic (sorted set-expansion). Top-level src file, must be
    # listed explicitly or its mutation gate passes vacuously (allowlist).
    "crates/rulesteward-fapolicyd/src/register.rs",
    "crates/rulesteward-sink/src/**/*.rs",
    "crates/rulesteward-cli/src/commands/trustdb_compute.rs",
    # P5 simulate workload parsing + evaluation dispatch (issue #66/#68/#69).
    "crates/rulesteward-cli/src/commands/simulate.rs",
    # P0 (v0.2 round 2) generic CSV serializer: RFC-4180 escaping branches.
    "crates/rulesteward-cli/src/output/csv.rs",
    # feat-report register renderers (output/register.rs): the trustJoin shape
    # dispatch logic (cap vs Shape A threshold, row-order, source label mapping)
    # is real branching logic covered by the 83-scenario oracle tests.
    "crates/rulesteward-cli/src/output/register.rs",
    # auditd logic modules (filled by pipeline P2):
    "crates/rulesteward-auditd/src/parser.rs",
    "crates/rulesteward-auditd/src/cost.rs",
    "crates/rulesteward-auditd/src/bands.rs",
    "crates/rulesteward-auditd/src/from_log.rs",
    # selinux logic modules (avc/denial frozen in P0.6/P0.7; triage=P3, te_emit=P4, categorize=P5):
    "crates/rulesteward-selinux/src/avc.rs",
    "crates/rulesteward-selinux/src/denial.rs",
    "crates/rulesteward-selinux/src/triage.rs",
    "crates/rulesteward-selinux/src/te_emit.rs",
    "crates/rulesteward-selinux/src/categorize.rs",
    # selinux-sys FFI shim: EXCLUDED from mutation scope (removed in PR #128).
    # It is the libsepol FFI (vendored in #125), built behind the default-off
    # `vendored` feature and not yet wired into any consumer (#124), so it has
    # 0% test coverage and every mutant is an unkillable survivor (they run with
    # 0s test, pure gate noise). Restore to this list once #124 wires it in AND
    # it has real test coverage. Tracked: #131.
]

exclude_globs = [
    "**/tests/**",
    "**/format.rs",
    "**/ast.rs",
