# The two `NdjsonStdoutSink` trait-method delegations are equivalent mutants:
# replacing their body with `Ok(())` cannot be observed by an in-process test
# because the real `std::io::Stdout` byte stream is not capturable. The identical
# write/flush logic IS killed via the generic `NdjsonSink<Vec<u8>>` path (the
# stdout newtype only forwards to it), so the behaviour is covered; only the thin
# real-stdout forwarding survives. Excluded by name (not `#[mutants::skip]`) so
# the rationale stays here in reviewable config.
#
# `error::rich_to_diagnostic` sets `column = span.start + 1` as a line-relative
# 1-based placeholder. The `parse_rules_file` call site immediately follows with
# `fill_columns(&mut diagnostics, source)`, which overwrites `column` from the
# file-relative span for every non-zero-start span. F01 diagnostics always have
# non-zero spans, so the initial +1 is dead: the observable column is always
# overwritten by fill_columns. Replacing +1 with *1 produces an identical
# externally-visible column value. Genuine equivalent mutant.
#
# `open_trustdb_readonly` opens with `EnvFlags::READ_ONLY | EnvFlags::NO_LOCK`.
# READ_ONLY = MDB_RDONLY = 0x20000 and NO_LOCK = MDB_NOLOCK = 0x400000 are
# DISJOINT bits (verified in lmdb-master-sys lmdb.h), so `READ_ONLY ^ NO_LOCK`
# == `READ_ONLY | NO_LOCK` == 0x420000. The `| -> ^` mutant is therefore a
# genuine equivalent mutant: behaviourally identical, unkillable by any test.
# (The sibling `| -> &` mutant yields 0x0, dropping NO_LOCK, and IS killed by
# the `open_does_not_create_lock_mdb` test.) Excluded by name, not
# `#[mutants::skip]`, so the rationale stays here in reviewable config.
#
# `verify_entry` line 144: the `guard -> false` mutant replaces the
# `e.kind() == ErrorKind::NotFound` guard on the `File::open` error arm with
# `false`, which would return `ReadError` even when `File::open` returns
# `NotFound`. Reaching this arm with `NotFound` requires `File::open` to fail
# with `NotFound` AFTER `std::fs::metadata` on the same path already succeeded.
# On Linux, this is only possible via a TOCTOU race: the file must be deleted
# (or its directory unlinked) in the window between the `metadata()` call and
# the `File::open()` call. There is no static (non-racy) construction that
# deterministically produces this outcome. The mutant therefore cannot be killed
# by any reliable, non-flaky test. It is a genuine unreachable-in-practice
# equivalent mutant: the branch it guards is dead code under normal usage.
#
# `categorize` line 196 (`bits & (REASON_CONS | REASON_RBAC)`): the `| -> ^`
# mutant rewrites the mask `REASON_CONS | REASON_RBAC` to `REASON_CONS ^
# REASON_RBAC`. REASON_CONS = 0x2 and REASON_RBAC = 0x4 are DISJOINT bits
# (rulesteward-selinux-sys/src/lib.rs), so `0x2 | 0x4` == `0x2 ^ 0x4` == 0x6: the
# mask is byte-identical, the mutant is behaviourally identical and unkillable by
# any test. Same disjoint-bit shape as the open_trustdb_readonly case above. (The
# sibling `| -> &` mutant yields 0x2 & 0x4 == 0x0, an all-zero mask that never
# matches the CONS/RBAC branch, and IS killed by the kat MLS/role constraint
# tests.) Excluded by name, not `#[mutants::skip]`, so the rationale stays here in
# reviewable config.
#
# `compute_scope` object-loop and subject-loop filter closures both use `*p < best_pri`
# (strict less-than). The `< -> <=` mutant is a genuine equivalent mutant in both
# locations because a tie is impossible:
# - Object-loop: each object key maps to a unique priority in {1,2,3,4,5,6}; no two
#   object keys can share a priority, so `*p == best_pri` never occurs during iteration.
# - Subject-loop: subject keys map to {50,60,70}; at the time the subject loop runs,
#   `best_pri` is either 255 (sentinel) or one of {1..6} (set by the object loop).
#   None of {50,60,70} can equal {1,2,3,4,5,6,255}, so a tie is impossible.
# In both cases `< p` and `<= p` produce identical results for all reachable inputs.
# Excluded by name, not `#[mutants::skip]`, so the rationale stays here in reviewable
# config.
#
# `ruleset_uses_filehash` (simulate/evaluate.rs) and the `ctx.ruleset_uses_filehash` match
# guard in `evaluate_query` are both an OPTIMIZATION GUARD, not a correctness gate:
# they only decide WHETHER to hash the object file on demand. Forcing either to
# `true` (the `-> bool with true` / `match guard ... with true` mutants) makes the
# on-demand hashing path run UNCONDITIONALLY - i.e. it hashes the object even when no
# rule carries a `filehash=`/`sha256hash=` field. But `facts.sha256` /
# `facts.sha256_unhashable` are READ by exactly one evaluator arm: the
# `sha256hash`|`filehash` object arm. If no rule references that field, the computed
# hash (or the unhashable flag) is never observed by `evaluate()`, so the verdict is
# byte-identical. The mutants only add redundant I/O with no verdict-observable
# effect: genuine equivalent mutants. (The sibling `-> false`/`with false` mutants
# would SKIP hashing when a filehash rule DOES need it, breaking the #127 deny path,
# and ARE killed by `filehash_present_but_unhashable_is_denied_not_widened` and the
# on-demand-hash oracle tests.) Excluded by name, not `#[mutants::skip]`, so the
# rationale stays here in reviewable config.
#
# NOTE: the `sha256_unhashable=true` -> `NoMatch` arm of `eval_object_field` in
# evaluate.rs is also pinned root-independently by the unit tests
# `unhashable_object_yields_nomatch_at_evaluator_layer` and
# `absent_object_hash_widens_sha256hash_constraint` (added #126/#127 round-3).
# The integration test `filehash_present_but_unhashable_is_denied_not_widened`
# (simulate_trustdb_resolution.rs) self-skips under root (chmod 000 is a no-op
# when DAC is bypassed); the unit tests fire regardless of uid.
#
# `parse_audit_event` (fanotify.rs) skips blank / "----" separator lines with
# `if trimmed.is_empty() || trimmed == "----" { continue; }`. The `|| -> &&`
# mutant changes the guard to "skip only if BOTH empty AND equal to '----'",
# which is never true (an empty string cannot equal "----"). With the mutant the
# blank/"----" lines are no longer skipped and fall through the three
# `if trimmed.contains("type=FANOTIFY"|"type=SYSCALL"|"type=PATH")` arms -- none
# of which match a blank or "----" line -- so no field is assigned and the parsed
# AuditEvent is byte-identical. Verified: with the mutant applied, all 518
# fapolicyd lib tests + the 22 explain_fanotify_parse integration tests pass.
# Genuine equivalent mutant (same separator-skip-is-an-optimisation shape already
# documented above for doctor.rs::parse_fanotify_denials). NOTE: the nightly
# --test-workspace run reports this mutant as a TIMEOUT (not a survivor) under
# 8-shard + concurrent load; excluding the equivalent removes that flake too.
#
# `fuzz_hooks::parse_trust_value_fuzz` (trustdb.rs) is a `#[doc(hidden)]` shim
# behind the non-default `fuzz-targets` feature; it only re-exports the
# crate-private `parse_trust_value` for the nightly fuzz crate. Its four
# constant-return mutants are unkillable by construction:
#   - Under the gate's DEFAULT features the module is cfg'd OUT, so the mutated
#     source line is never compiled; the binary is identical and every test
#     passes -> cargo-mutants reports "missed" (a phantom, same out-of-compiled-
#     scope class as the excluded selinux-sys FFI).
#   - Under `--features fuzz-targets` the mutants are UNVIABLE: they construct the
#     tuple with `Default::default()` for `TrustSource`, which does not implement
#     `Default` (E0277), so they fail to compile.
# Either way no test can kill them. The shim's real behaviour IS covered, under
# the feature it lives in, by
# `trustdb::tests::parse_trust_value_fuzz_shim_matches_parser` (asserts the shim
# round-trips a well-formed value through `parse_trust_value`). Excluded by name
# (not `#[mutants::skip]`) so the rationale stays in reviewable config.
exclude_re = [
    "NdjsonStdoutSink>::(emit|flush)",
    "rich_to_diagnostic",
    'replace \| with \^ in open_trustdb_readonly',
    'replace match guard e\.kind\(\) == std::io::ErrorKind::NotFound with false in verify_entry',
    'replace \| with \^ in categorize',
    'replace < with <= in compute_scope',
    # doctor LiveProbe shell-out methods (#76/#77/#78): the real OS access
    # (systemctl/uname/auditctl/fapolicyd-cli/rpm/df/ausearch dispatch) has no
    # unit tests by design -- it is covered by the e2e graceful-degradation test
    # and the live VM smoke. The PURE check-classification logic (check_* fns,
    # parse_kernel_version, parse_lint_counts, worst_exit_code, renderers) stays
    # in scope and is killed by the FakeProbe unit tests.
    '<impl SystemProbe for LiveProbe>',
    # container-check LiveContainerProbe shell-out methods (#175): same rationale
    # as the doctor LiveProbe above. The real OS access (which/systemctl/test/rpm/
    # ausearch/fapolicyd-cli dispatch) has no unit tests by design; it is covered
    # by the e2e graceful-degradation test + live VM smoke. The PURE parsers in
    # probe.rs (parse_effective_conf, crun_covered_in_rules, dump_db_trusted,
    # count_runtime_denials) and the classifier stay in scope, killed by FakeProbe
    # + parser unit tests.
    '<impl ContainerProbe for LiveContainerProbe>',
    # migrate LiveMigrateProbe shell-out (#211, session 6a): same rationale as
    # the doctor LiveProbe above - the real `fagenrules --check` spawn has no
    # unit-test seam; the pure outcome classification is FakeProbe-tested and
    # stays in the gate. (Matches nothing until Lane B lands the impl.)
    '<impl MigrateProbe for LiveMigrateProbe>',
    # `TmpGuard::drop` (#211, session 6a): best-effort temp-file cleanup used
    # only by the LiveMigrateProbe shell-out path. Deleting the body leaks a
    # temp file but has no observable behavior any unit test can assert (the
    # file name is process-id-scoped); same I/O-cleanup rationale as above.
    '<impl Drop for TmpGuard>',
    # `read_fapolicyd_mode` is a one-line delegation wrapper:
    #   `read_fapolicyd_mode_from(Path::new("/etc/fapolicyd/fapolicyd.conf"))`
    # On the test/CI machine /etc/fapolicyd/fapolicyd.conf does not exist, so
    # the inner fn always returns None via the `?` operator.  A mutant that
    # replaces the entire wrapper return with None / Some("") / Some("xyzzy")
    # is therefore behaviourally identical to the real code in ALL test
    # environments (None == None; Some("") and Some("xyzzy") are unreachable
    # because the file is absent).  The INNER function `read_fapolicyd_mode_from`
    # IS fully tested via the tempfile-based unit tests; the wrapper's only job
    # is to supply the production path, which is verified by the live VM smoke.
    # Genuine equivalent mutants for the test environment.
    'replace read_fapolicyd_mode -> Option<String>',
    # (`extract_audit_field == 0 -> != 0` is NOT excluded: it is killed directly
    # by `extract_audit_field_key_at_position_zero` in rulesteward-core, which
    # exercises the pos-0 guard arm. The extractor moved out of doctor/probe.rs
    # (formerly `extract_kv`) and fanotify.rs (formerly `extract_field`) into the
    # single shared core helper in #192. A real kill beats an equivalence exclusion.)
    # `parse_fanotify_denials` block-skip guard: `t.is_empty() || t == "----"`.
    # The `|| -> &&` mutant changes the guard to "skip only if BOTH empty AND
    # equal to '----'", which is never true (an empty string cannot equal
    # "----").  With the mutant, "----" and "" lines are no longer skipped and
    # fall through the three `if t.contains(...)` branches -- but none of the
    # three patterns ("type=FANOTIFY", "type=SYSCALL", "type=PATH") match a
    # "----" or empty line, so all three `else if` arms are taken as the final
    # `else if t.contains("type=PATH")` (false), which is a no-op.  The tally
    # and total are therefore identical to the original.  Genuine equivalent mutant:
    # the separator-skip is an optimisation, not a correctness boundary.
    'replace \|\| with && in parse_fanotify_denials',
    'replace ruleset_uses_filehash -> bool with true',
    'replace match guard ctx\.ruleset_uses_filehash with true in evaluate_query',
    'replace \|\| with && in parse_audit_event',
    'replace fuzz_hooks::parse_trust_value_fuzz',
    # selinux-sys FFI shim (#131): the 12 mutants below are the survivors of the
    # restore gate run; every one is a genuine equivalent or a fault-injection-
    # only failure arm, verified against the VENDORED libsepol source where the
    # claim is load-bearing. The shim's logic mutants (rc inversions, context-
    # site checks, perm-bitmask accumulation, reason passthrough) ARE in scope
    # and killed by tests/known_answer_replay.rs.
    # - silence_libsepol_debug -> (): toggles libsepol stderr diagnostics only
    #   (BADSCON warnings); unobservable in-process without C-level fd capture.
    'selinux-sys/src/lib\.rs:.*replace silence_libsepol_debug with \(\)',
    # - Policy::load `||`->`&&` (lines 389/398) + `delete -` on the rc:-1
    #   literals in the same arms (lines 393/403): the sepol_policydb_create /
    #   sepol_policy_file_create alloc-failure guards; in practice rc==0 AND the
    #   pointer is non-null, so both operators short-circuit identically.
    #   Reaching the divergence requires OOM injection.
    'selinux-sys/src/lib\.rs:.*replace \|\| with && in Policy::load',
    'selinux-sys/src/lib\.rs:.*delete - in Policy::load',
    # - Policy::replay `delete -` on rc:-1 (lines 481/485): the
    #   sepol_set_policydb / sepol_set_sidtab failure arms. Those setters are
    #   unconditional global assignments that always `return 0` (vendor
    #   services.c:121-131); the arms are defensive dead code kept for ABI
    #   drift, unreachable today.
    'selinux-sys/src/lib\.rs:.*delete - in Policy::replay',
    # - `+`->`*` on `scontext.len() + 1` (lines 490/494): len+1 vs len for
    #   sepol_context_to_sid is a TRUE equivalent. vendor context.c
    #   context_from_string copies con_str_len bytes and ALWAYS writes its own
    #   NUL terminator, so including the trailing NUL in the length changes
    #   nothing; the len==0/len==1 empty-context edge returns BadContext either
    #   way. The +1 form is kept for audit2why.c:345 (libselinux 3.10) parity.
    'selinux-sys/src/lib\.rs:.*replace \+ with \* in Policy::replay',
    # - `delete !` on the reason_buf free guard (line 530): the inverted guard
    #   calls free(NULL) (a C no-op) and leaks the real buffer; no in-process
    #   observable.
    'selinux-sys/src/lib\.rs:.*delete ! in Policy::replay',
    # - `<`->`>` on the compute rc check, line 533 ONLY (line-anchored: the
    #   same operator swap at the context/class/perm sites 490/494/499/508 IS
    #   caught and must stay gated; if lib.rs line numbers shift this pattern
    #   stops matching and the equivalent RESURFACES as a survivor - a visible
    #   failure, never a silent gate shrink): sepol_compute_av_reason_buffer
    #   returns 0 on success and negative only on hard failure (vendor
    #   services.c), so rc>0 never occurs and the swap only re-routes an
    #   unreachable arm.
    'selinux-sys/src/lib\.rs:533:.*replace < with > in Policy::replay',
    # - Drop -> () (line 552): pure in-process leak of the sidtab htable +
    #   policydb; unobservable by a functional test (PR #170 precedent).
    'selinux-sys/src/lib\.rs:.*replace <impl Drop for Policy>::drop with \(\)',
]

# Per-mutant TEST timeout floor (seconds), NOT the per-shard job timeout (that is
# `timeout-minutes` in mutants.yml). cargo-mutants auto-sets the per-mutant test
# timeout to max(this floor, baseline_test_time x multiplier); the floor binds here.
#
# The nightly gate runs `--test-workspace true`, so EVERY mutant re-runs the entire
# workspace suite (unit + proptest + insta). That takes ~100-110s/mutant, which
# exceeded the old 90s floor -> cargo-mutants killed every mutant as a false TIMEOUT
# (exit 3) before it could be evaluated, so all 8 shards failed without testing a
# single mutant. Raise the floor to 180s: comfortably above the observed
# workspace-suite duration (with headroom for proptest variance / runner load),
# while still bounding a genuinely hung mutant.
minimum_test_timeout = 180.0
