    # `parse_fanotify_denials` block-skip guard: `t.is_empty() || t == "----"`.
    # The `|| -> &&` mutant changes the guard to "skip only if BOTH empty AND
    # equal to '----'", which is never true (an empty string cannot equal
    # "----").  With the mutant, "----" and "" lines are no longer skipped and
