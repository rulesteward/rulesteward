# cargo-mutants configuration - scope mutation testing to parser + lints + sink.
#
# Mutation testing is run against crates that contain business logic:
#   * rulesteward-core (Diagnostic type)
#   * rulesteward-fapolicyd (parser + lint walker)
#   * rulesteward-sink (Event schema + EventSink trait + NDJSON sinks)
#
# Excludes:
#   * format.rs (Display impls - mutation-noise heavy; the round-trip proptest
#     property catches semantic regressions there but cargo-mutants would
#     emit many low-signal "delete this whitespace" candidates).
#   * ast.rs (type definitions only; no behavioral methods to mutate).
#   * rulesteward-cli: mechanical glue (arg parsing, dispatch, format selection,
#     exit-code mapping) whose paths are covered by end-to-end assert_cmd tests
#     in tests/e2e_lint.rs.
#   * rulesteward-auditd, -selinux, -license: stub crates.
#   * every test file (mutating tests is meaningless).

examine_globs = [
    "crates/rulesteward-core/src/diagnostic.rs",
    "crates/rulesteward-fapolicyd/src/parser/**/*.rs",
    "crates/rulesteward-fapolicyd/src/lints/**/*.rs",
    "crates/rulesteward-fapolicyd/src/attrs.rs",
    "crates/rulesteward-fapolicyd/src/trustdb.rs",
    "crates/rulesteward-sink/src/**/*.rs",
]

exclude_globs = [
    "**/tests/**",
    "**/format.rs",
    "**/ast.rs",
]

# The two `NdjsonStdoutSink` trait-method delegations are equivalent mutants:
# replacing their body with `Ok(())` cannot be observed by an in-process test
# because the real `std::io::Stdout` byte stream is not capturable. The identical
# write/flush logic IS killed via the generic `NdjsonSink<Vec<u8>>` path (the
# stdout newtype only forwards to it), so the behaviour is covered; only the thin
# real-stdout forwarding survives. Excluded by name (not `#[mutants::skip]`) so
# the rationale stays here in reviewable config.
#
# `error::rich_to_diagnostic` sets `column = span.start + 1` as a line-relative
# 1-based placeholder. The `parse_rules_file` call site immediately follows with
# `fill_columns(&mut diagnostics, source)`, which overwrites `column` from the
# file-relative span for every non-zero-start span. F01 diagnostics always have
# non-zero spans, so the initial +1 is dead: the observable column is always
# overwritten by fill_columns. Replacing +1 with *1 produces an identical
# externally-visible column value. Genuine equivalent mutant.
#
# `open_trustdb_readonly` opens with `EnvFlags::READ_ONLY | EnvFlags::NO_LOCK`.
# READ_ONLY = MDB_RDONLY = 0x20000 and NO_LOCK = MDB_NOLOCK = 0x400000 are
# DISJOINT bits (verified in lmdb-master-sys lmdb.h), so `READ_ONLY ^ NO_LOCK`
# == `READ_ONLY | NO_LOCK` == 0x420000. The `| -> ^` mutant is therefore a
# genuine equivalent mutant: behaviourally identical, unkillable by any test.
# (The sibling `| -> &` mutant yields 0x0, dropping NO_LOCK, and IS killed by
# the `open_does_not_create_lock_mdb` test.) Excluded by name, not
# `#[mutants::skip]`, so the rationale stays here in reviewable config.
exclude_re = [
    "NdjsonStdoutSink>::(emit|flush)",
    "rich_to_diagnostic",
    'replace \| with \^ in open_trustdb_readonly',
]

# Tests are mixed unit + proptest + insta; proptest property runs especially
# can be slow, so generous timeout (90s) avoids false-positive "timed out"
# survivors that aren't really survivors.
minimum_test_timeout = 90.0
