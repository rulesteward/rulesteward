    'replace \|\| with && in parse_fanotify_denials',
    'replace ruleset_uses_filehash -> bool with true',
    'replace match guard ctx\.ruleset_uses_filehash with true in evaluate_query',
    'replace \|\| with && in parse_audit_event',
    'replace fuzz_hooks::parse_trust_value_fuzz',
