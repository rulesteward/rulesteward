    'selinux-sys/src/lib\.rs:.*delete ! in Policy::replay',
    # - `<`->`>` on the compute rc check, line 533 ONLY (line-anchored: the
    #   same operator swap at the context/class/perm sites 490/494/499/508 IS
    #   caught and must stay gated; if lib.rs line numbers shift this pattern
