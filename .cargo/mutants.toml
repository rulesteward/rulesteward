# The two `NdjsonStdoutSink` trait-method delegations are equivalent mutants:
# replacing their body with `Ok(())` cannot be observed by an in-process test
# because the real `std::io::Stdout` byte stream is not capturable. The identical
# write/flush logic IS killed via the generic `NdjsonSink<Vec<u8>>` path (the
# stdout newtype only forwards to it), so the behaviour is covered; only the thin
# real-stdout forwarding survives. Excluded by name (not `#[mutants::skip]`) so
# the rationale stays here in reviewable config.
#
# `error::rich_to_diagnostic` sets `column = span.start + 1` as a line-relative
# 1-based placeholder. The `parse_rules_file` call site immediately follows with
# `fill_columns(&mut diagnostics, source)`, which overwrites `column` from the
# file-relative span for every non-zero-start span. F01 diagnostics always have
# non-zero spans, so the initial +1 is dead: the observable column is always
# overwritten by fill_columns. Replacing +1 with *1 produces an identical
# externally-visible column value. Genuine equivalent mutant.
#
# `open_env_readonly` (the #291/#317 refactor split the NO_LOCK fallback open out
# of `open_trustdb_readonly` into this helper) builds the lockless flags with
# `EnvFlags::READ_ONLY | EnvFlags::NO_LOCK`. READ_ONLY = MDB_RDONLY = 0x20000 and
# NO_LOCK = MDB_NOLOCK = 0x400000 are DISJOINT bits (verified in lmdb-master-sys
# lmdb.h), so `READ_ONLY ^ NO_LOCK` == `READ_ONLY | NO_LOCK` == 0x420000. The
# `| -> ^` mutant is therefore a genuine equivalent mutant: behaviourally
# identical, unkillable by any test. (The sibling `| -> &` mutant yields 0x0,
# dropping NO_LOCK, and IS killed by the
# `open_prevention_creates_lock_fallback_does_not` test's fallback-path
# assertion.) Excluded by name, not `#[mutants::skip]`, so the rationale stays
# here in reviewable config.
#
# `verify_entry` line 144: the `guard -> false` mutant replaces the
# `e.kind() == ErrorKind::NotFound` guard on the `File::open` error arm with
# `false`, which would return `ReadError` even when `File::open` returns
# `NotFound`. Reaching this arm with `NotFound` requires `File::open` to fail
# with `NotFound` AFTER `std::fs::metadata` on the same path already succeeded.
# On Linux, this is only possible via a TOCTOU race: the file must be deleted
# (or its directory unlinked) in the window between the `metadata()` call and
# the `File::open()` call. There is no static (non-racy) construction that
# deterministically produces this outcome. The mutant therefore cannot be killed
# by any reliable, non-flaky test. It is a genuine unreachable-in-practice
# equivalent mutant: the branch it guards is dead code under normal usage.
#
# `categorize` line 196 (`bits & (REASON_CONS | REASON_RBAC)`): the `| -> ^`
# mutant rewrites the mask `REASON_CONS | REASON_RBAC` to `REASON_CONS ^
# REASON_RBAC`. REASON_CONS = 0x2 and REASON_RBAC = 0x4 are DISJOINT bits
# (rulesteward-selinux-sys/src/lib.rs), so `0x2 | 0x4` == `0x2 ^ 0x4` == 0x6: the
# mask is byte-identical, the mutant is behaviourally identical and unkillable by
# any test. Same disjoint-bit shape as the open_trustdb_readonly case above. (The
# sibling `| -> &` mutant yields 0x2 & 0x4 == 0x0, an all-zero mask that never
# matches the CONS/RBAC branch, and IS killed by the kat MLS/role constraint
# tests.) Excluded by name, not `#[mutants::skip]`, so the rationale stays here in
# reviewable config.
#
# `compute_scope` object-loop and subject-loop filter closures both use `*p < best_pri`
# (strict less-than). The `< -> <=` mutant is a genuine equivalent mutant in both
# locations because a tie is impossible:
# - Object-loop: each object key maps to a unique priority in {1,2,3,4,5,6}; no two
#   object keys can share a priority, so `*p == best_pri` never occurs during iteration.
# - Subject-loop: subject keys map to {50,60,70}; at the time the subject loop runs,
#   `best_pri` is either 255 (sentinel) or one of {1..6} (set by the object loop).
#   None of {50,60,70} can equal {1,2,3,4,5,6,255}, so a tie is impossible.
# In both cases `< p` and `<= p` produce identical results for all reachable inputs.
# Excluded by name, not `#[mutants::skip]`, so the rationale stays here in reviewable
# config.
#
# `ruleset_uses_filehash` (simulate/evaluate.rs) and the `ctx.ruleset_uses_filehash` match
# guard in `evaluate_query` are both an OPTIMIZATION GUARD, not a correctness gate:
# they only decide WHETHER to hash the object file on demand. Forcing either to
# `true` (the `-> bool with true` / `match guard ... with true` mutants) makes the
# on-demand hashing path run UNCONDITIONALLY - i.e. it hashes the object even when no
# rule carries a `filehash=`/`sha256hash=` field. But `facts.sha256` /
# `facts.sha256_unhashable` are READ by exactly one evaluator arm: the
# `sha256hash`|`filehash` object arm. If no rule references that field, the computed
# hash (or the unhashable flag) is never observed by `evaluate()`, so the verdict is
# byte-identical. The mutants only add redundant I/O with no verdict-observable
# effect: genuine equivalent mutants. (The sibling `-> false`/`with false` mutants
# would SKIP hashing when a filehash rule DOES need it, breaking the #127 deny path,
# and ARE killed by `filehash_present_but_unhashable_is_denied_not_widened` and the
# on-demand-hash oracle tests.) Excluded by name, not `#[mutants::skip]`, so the
# rationale stays here in reviewable config.
#
# NOTE: the `sha256_unhashable=true` -> `NoMatch` arm of `eval_object_field` in
# evaluate.rs is also pinned root-independently by the unit tests
# `unhashable_object_yields_nomatch_at_evaluator_layer` and
# `absent_object_hash_widens_sha256hash_constraint` (added #126/#127 round-3).
# The integration test `filehash_present_but_unhashable_is_denied_not_widened`
# (simulate_trustdb_resolution.rs) self-skips under root (chmod 000 is a no-op
# when DAC is bypassed); the unit tests fire regardless of uid.
#
# `parse_audit_event` (fanotify.rs) skips blank / "----" separator lines with
# `if trimmed.is_empty() || trimmed == "----" { continue; }`. The `|| -> &&`
# mutant changes the guard to "skip only if BOTH empty AND equal to '----'",
# which is never true (an empty string cannot equal "----"). With the mutant the
# blank/"----" lines are no longer skipped and fall through the three
# `if trimmed.contains("type=FANOTIFY"|"type=SYSCALL"|"type=PATH")` arms -- none
# of which match a blank or "----" line -- so no field is assigned and the parsed
# AuditEvent is byte-identical. Verified: with the mutant applied, all 518
# fapolicyd lib tests + the 22 explain_fanotify_parse integration tests pass.
# Genuine equivalent mutant (same separator-skip-is-an-optimisation shape already
# documented above for doctor.rs::parse_fanotify_denials). NOTE: the nightly
# --test-workspace run reports this mutant as a TIMEOUT (not a survivor) under
# 8-shard + concurrent load; excluding the equivalent removes that flake too.
#
# `fuzz_hooks::parse_trust_value_fuzz` (trustdb.rs) is a `#[doc(hidden)]` shim
# behind the non-default `fuzz-targets` feature; it only re-exports the
# crate-private `parse_trust_value` for the nightly fuzz crate. Its four
# constant-return mutants are unkillable by construction:
#   - Under the gate's DEFAULT features the module is cfg'd OUT, so the mutated
#     source line is never compiled; the binary is identical and every test
#     passes -> cargo-mutants reports "missed" (a phantom, same out-of-compiled-
#     scope class as the excluded selinux-sys FFI).
#   - Under `--features fuzz-targets` the mutants are UNVIABLE: they construct the
#     tuple with `Default::default()` for `TrustSource`, which does not implement
#     `Default` (E0277), so they fail to compile.
# Either way no test can kill them. The shim's real behaviour IS covered, under
# the feature it lives in, by
# `trustdb::tests::parse_trust_value_fuzz_shim_matches_parser` (asserts the shim
# round-trips a well-formed value through `parse_trust_value`). Excluded by name
# (not `#[mutants::skip]`) so the rationale stays in reviewable config.
