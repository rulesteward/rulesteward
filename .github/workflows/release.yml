name: release

# Tag-gated release pipeline. Fires only on version tags (`v*`). The PR/main CI
# in ci.yml is unaffected; this workflow is purely additive and easy to disable.
#
# Three stages, connected by a single `dist/` artifact so each runs in the
# environment it needs:
#   build      (ubuntu)            -- static musl binary + manpage + RPM + SBOM + SHA256SUMS
#   rpm-smoke  (rocky container)   -- dnf-install the RPM and run the binary
#   publish    (ubuntu)            -- cosign-keyless-sign the checksums, then create the GitHub Release
#
# Validated locally on 2026-06-02: every asset-generation command below was run
# by hand and the SHA256SUMS verified. The CI-only parts this pipeline adds on top
# of that local proof are: the cargo-tool install, cosign keyless OIDC signing, the
# Rocky RPM smoke-install, and the GitHub Release creation. Those are what the
# v0.1.0-rc1 dry-run exercises.
on:
  push:
    tags: ["v*"]

# Least privilege: the workflow default is read-only. Only the `publish` job
# elevates to `contents: write` (to create the GitHub Release) and `id-token: write`
# (so cosign can mint a short-lived Sigstore certificate from the ambient GitHub
# OIDC token -- keyless signing, no long-lived private key). build + rpm-smoke
# never get write or OIDC.
permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1
  TARGET: x86_64-unknown-linux-musl

jobs:
  build:
    name: build static musl binary + assets
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - name: Install stable Rust + musl target
        run: |
          set -euxo pipefail
          curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs \
            | bash -s -- -y --profile minimal --default-toolchain stable
          echo "$HOME/.cargo/bin" >> "$GITHUB_PATH"
          ~/.cargo/bin/rustup target add x86_64-unknown-linux-musl

      # musl-tools provides musl-gcc. `make` + host `gcc` are additionally
      # needed now that the authoritative-categorizer feature is DEFAULT-ON
      # (#124): the release build compiles the vendored libsepol 3.10 C source
      # via build.rs (libsepol's Makefile + host cc; musl-gcc is the per-target
      # compiler), and the shipped binary statically links libsepol (LGPL-2.1).
      - name: Install build deps (make, gcc, musl-tools)
        run: sudo apt-get update && sudo apt-get install -y make gcc musl-tools

      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          key: release-musl

      # Tier-B asset tooling, pinned to the versions validated locally on
      # 2026-06-02. Installed via cargo-binstall (prebuilt binaries) rather than
      # source-compiled. Pinned for the same drift-prevention reason ci.yml pins
      # cargo-audit / cargo-deny.
      - uses: taiki-e/install-action@fd2f5e3d644b484055ebf4268f474c565f148f25 # v2
        with:
          tool: cargo-binstall
      # `--force` always (re)installs the binaries rather than trusting binstall's
      # "already installed" metadata. Harmless on GitHub-hosted runners (clean image
      # each run); it also kept the release independent of leftover state back when
      # this ran on a persistent self-hosted runner (a runner update could wipe
      # ~/.cargo/bin while leaving the metadata, so binstall would skip the reinstall
      # and the next `cargo auditable` failed with "no such command" -- observed in
      # the v0.1.0-rc5 dry-run). Kept for robustness.
      - name: Install asset tools (auditable, generate-rpm, cyclonedx, about)
        run: cargo binstall -y --force cargo-auditable@0.7.4 cargo-generate-rpm@0.21.0 cargo-cyclonedx@0.5.9 cargo-about@0.9.0

      # Build the shipped binary with the dependency manifest embedded
      # (cargo-auditable writes a `.dep-v0` ELF section that `cargo audit bin` /
      # syft / trivy can read back from the binary itself). --locked pins the
      # exact reviewed Cargo.lock. [profile.release] supplies strip + LTO.
      - name: Build static musl binary (auditable, release)
        env:
          CC_x86_64_unknown_linux_musl: musl-gcc
          CARGO_TARGET_X86_64_UNKNOWN_LINUX_MUSL_LINKER: musl-gcc
        run: cargo auditable build --release --target "$TARGET" --bin rulesteward --locked

      - name: Verify static linkage
        run: |
          BIN="target/$TARGET/release/rulesteward"
          file "$BIN"
          # musl + recent Rust yields "static-pie linked"; older yields
          # "statically linked". Both are fully static -- accept either.
          file "$BIN" | grep -qE "statically linked|static-pie linked"

      # Assemble dist/ with the exact commands validated locally. The RPM reads
      # [package.metadata.generate-rpm] from crates/rulesteward-cli/Cargo.toml; its
      # asset source paths are resolved relative to this workspace-root cwd. The
      # SBOM is scoped to the CLI crate's musl dependency set.
      - name: Assemble release assets
        run: |
          set -euxo pipefail
          BIN="target/$TARGET/release/rulesteward"
          rm -rf dist && mkdir -p dist
          # 1. man page (the binary renders its own clap tree to roff)
          "$BIN" mangen dist
          # 2. the binary itself
          cp "$BIN" dist/rulesteward
          # 2b. THIRD-PARTY-LICENSES: aggregate the permissive (MIT/Apache/BSD/...)
          #     Rust crates statically linked into the binary (cargo-about reads
          #     about.toml + about.hbs at the workspace root). Generated BEFORE the
          #     RPM so the RPM asset below can bundle it. musl libc (MIT) is linked
          #     statically but is NOT a Cargo dependency, so cargo-about cannot
          #     enumerate it -- append its verbatim COPYRIGHT. The copyleft /
          #     vendored-C texts (LGPL-2.1, OLDAP-2.8) stay in their own dedicated
          #     assets below; this file is the permissive bulk.
          # --offline pins license resolution to the local crate sources + the
          # committed about.toml (no clearlydefined.io network call at release
          # time), matching the --locked discipline used elsewhere here. Verified
          # locally to produce byte-identical coverage to the networked run.
          cargo about generate about.hbs --target "$TARGET" --offline -o dist/THIRD-PARTY-LICENSES
          {
            printf '\n\n'
            printf '========================================================================\n'
            printf 'musl libc (statically linked via the %s target; MIT)\n' "$TARGET"
            printf '========================================================================\n'
            cat LICENSES/musl-COPYRIGHT.txt
          } >> dist/THIRD-PARTY-LICENSES
          # 3. RPM
          cargo generate-rpm -p crates/rulesteward-cli --target "$TARGET"
          cp "target/$TARGET/generate-rpm/"rulesteward-*.x86_64.rpm dist/
          # 4. CycloneDX SBOM (CLI crate, musl dep set)
          cargo cyclonedx --manifest-path crates/rulesteward-cli/Cargo.toml -f json \
            --target "$TARGET" --override-filename rulesteward.cdx
          cp crates/rulesteward-cli/rulesteward.cdx.json dist/
          # 5. LGPL-2.1 deliverables for the shipped binary. The default build
          #    statically links libsepol 3.10 (LGPL-2.1, #124), so the release MUST
          #    carry the full LGPL-2.1 text + the NOTICE, and point to the complete
          #    corresponding source (vendored in-tree). This satisfies the LGPL-2.1
          #    license/notice + source-availability obligations for the binary.
          cp LICENSES/LGPL-2.1.txt dist/LGPL-2.1.txt
          cp NOTICE dist/NOTICE
          # liblmdb (via the LOCKED heed -> lmdb-master-sys) is statically linked
          # into every build under the permissive OpenLDAP Public License v2.8.
          # OLDAP-2.8 conditions 2+3 require the copyright notice + a verbatim
          # license copy with binary redistribution; ship the license text (the
          # NOTICE above carries the attribution).
          cp LICENSES/OLDAP-2.8.txt dist/OLDAP-2.8.txt
          # Pointer to the complete corresponding libsepol source. The source is
          # vendored in-tree at the path below (it travels with the source release
          # tarball GitHub attaches automatically); this file makes the LGPL-2.1
          # source offer explicit alongside the binary assets.
          cat > dist/LGPL-2.1-SOURCE-OFFER.txt <<EOF
          RuleSteward ${GITHUB_REF_NAME:-this release} statically links libsepol 3.10,
          licensed under the GNU Lesser General Public License, version 2.1
          (full text: LGPL-2.1.txt, also at LICENSES/LGPL-2.1.txt in the source tree).

          The complete, corresponding source for libsepol 3.10 is included in the
          RuleSteward source repository (the "Source code" archive attached to this
          release) at:

            crates/rulesteward-selinux-sys/vendor/libsepol/

          Upstream: https://github.com/SELinuxProject/selinux (release 3.10).
          libsepol is statically linked into the rulesteward binary; the build
          recipe is crates/rulesteward-selinux-sys/build.rs and the static archive
          is reproducible from that vendored source, satisfying the LGPL-2.1
          section 6 relinking requirement.
          EOF
          # 6. checksums over every shipped asset (not over SHA256SUMS itself)
          ( cd dist && sha256sum rulesteward rulesteward.1 rulesteward-*.x86_64.rpm rulesteward.cdx.json THIRD-PARTY-LICENSES LGPL-2.1.txt NOTICE LGPL-2.1-SOURCE-OFFER.txt OLDAP-2.8.txt > SHA256SUMS )
          echo "--- dist/ ---"; ls -l dist; echo "--- SHA256SUMS ---"; cat dist/SHA256SUMS

      - name: Upload dist artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: release-dist
          path: dist/
          if-no-files-found: error
          retention-days: 7

  rpm-smoke:
    name: smoke-install the RPM on Rocky
    needs: build
    runs-on: ubuntu-latest
    container:
      image: rockylinux/rockylinux:9
    defaults:
      run:
        shell: /usr/bin/bash --noprofile --norc -eo pipefail {0}
    steps:
      - name: Pre-install tar (required by actions/download-artifact)
        run: dnf --setopt=install_weak_deps=False --setopt=tsflags=nodocs -y install tar gzip
      - name: Download dist artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          name: release-dist
          path: dist
      # Install the package the way an operator would, then prove the installed
      # binary runs. Catches RPM-packaging regressions (wrong path, broken Requires,
      # un-runnable binary) before the release is published.
      - name: dnf install the RPM and run it
        run: |
          dnf install -y ./dist/rulesteward-*.x86_64.rpm
          command -v rulesteward
          rulesteward --version
          # Capture --help to a file FIRST. The job shell runs with `pipefail`, so
          # `rulesteward --help | head -1` would fail: head closes the pipe after
          # line 1, rulesteward errors on the broken pipe writing the rest of its
          # multi-line help, and pipefail propagates that non-zero. Same trap the
          # ci.yml smoke step documents. Redirect to a file, then read the file.
          rulesteward --help > /tmp/rs_help.txt
          head -1 /tmp/rs_help.txt
          # The man page is %doc. Minimal RHEL/Rocky containers default to
          # `tsflags=nodocs`, which SKIPS extracting %doc to the filesystem, so a
          # `test -f` on the installed man page is host-dependent. Assert instead
          # that the RPM *manifest* declares it (host-independent). (Capture to a
          # file to avoid the pipefail/SIGPIPE trap that bit the --help check.)
          rpm -qlp ./dist/rulesteward-*.x86_64.rpm > /tmp/rpm_files.txt
          grep -q '/usr/share/man/man1/rulesteward.1' /tmp/rpm_files.txt
          # LICENSE is a plain (non-%doc) file, so it MUST land on disk even under
          # nodocs. Assert the installed file directly -- this guards the "a shipped
          # binary always carries its license" contract against a regression that
          # re-marks LICENSE as doc=true (which would silently drop it on nodocs).
          test -f /usr/share/licenses/rulesteward/LICENSE
          # The default build statically links libsepol 3.10 (LGPL-2.1, #124), so the
          # RPM must also ship the LGPL-2.1 text + NOTICE (both plain, non-%doc).
          # Assert they land on disk to guard the LGPL obligation against regression.
          test -f /usr/share/licenses/rulesteward/LGPL-2.1.txt
          test -f /usr/share/licenses/rulesteward/NOTICE
          # liblmdb (OLDAP-2.8) is statically linked into every build; its
          # license text must land on disk (plain, non-%doc) under nodocs too.
          test -f /usr/share/licenses/rulesteward/OLDAP-2.8.txt
          # THIRD-PARTY-LICENSES (permissive Rust crates + musl libc, #185) is
          # plain (non-%doc) too; assert it lands on disk under nodocs.
          test -f /usr/share/licenses/rulesteward/THIRD-PARTY-LICENSES

  publish:
    name: sign + publish GitHub Release
    needs: [build, rpm-smoke]
    runs-on: ubuntu-latest
    # Only this job needs write + OIDC. Scoped here rather than workflow-wide so
    # the build / smoke jobs run with least privilege. `attestations: write` lets
    # the SLSA provenance step record an attestation to the GitHub attestation log.
    permissions:
      contents: write
      id-token: write
      attestations: write
    steps:
      - name: Download dist artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          name: release-dist
          path: dist

      - name: Install cosign
        uses: sigstore/cosign-installer@398d4b0eeef1380460a10c8013a76f728fb906ac # v3

      # Keyless sign the checksums file. The ambient GitHub OIDC token (granted by
      # id-token: write) is exchanged for a short-lived Sigstore certificate; the
      # signature + cert are emitted as detached files. Verifying SHA256SUMS then
      # transitively authenticates every asset it lists. `--yes` skips the
      # interactive Rekor-upload confirmation.
      - name: cosign sign-blob (keyless) the checksums
        run: |
          cosign sign-blob --yes \
            --output-signature dist/SHA256SUMS.sig \
            --output-certificate dist/SHA256SUMS.pem \
            dist/SHA256SUMS
          ls -l dist/SHA256SUMS.sig dist/SHA256SUMS.pem

      # Create the Release via the GitHub API (softprops/action-gh-release) rather
      # than a `gh release create` shell step. This JS action talks to the API
      # directly using the job's GITHUB_TOKEN (contents: write above), uploads the
      # asset globs, and marks rc/alpha/beta tags as prereleases via the expression
      # below (the tag is consumed by the action, never interpolated into a shell).
      # Pinned to @v3 to match the other major-version action pins in this repo.
      # SLSA build-provenance attestation (#188). Records a signed provenance
      # statement binding the distributed binary + RPM to this workflow run,
      # commit, and builder. Stored in the GitHub attestation log and verifiable
      # after release with `gh attestation verify <file> --repo rulesteward/rulesteward`.
      # Reuses the ambient OIDC token (id-token: write); attestations: write lets
      # the action post the attestation. Run here (not in build) to keep build/smoke
      # least-privilege per this workflow's design; the subject is the exact artifact
      # passed via the build artifact and published below, so the binding holds.
      - name: Attest build provenance (binary + RPM)
        uses: actions/attest-build-provenance@a2bbfa25375fe432b6a289bc6b6cd05ecd0c4c32 # v4.1.0
        with:
          subject-path: |
            dist/rulesteward
            dist/rulesteward-*.x86_64.rpm

      - name: Create GitHub Release
        uses: softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda # v3
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          generate_release_notes: true
          prerelease: ${{ contains(github.ref_name, '-rc') || contains(github.ref_name, '-alpha') || contains(github.ref_name, '-beta') }}
          fail_on_unmatched_files: true
          files: |
            dist/rulesteward
            dist/rulesteward.1
            dist/rulesteward-*.x86_64.rpm
            dist/rulesteward.cdx.json
            dist/THIRD-PARTY-LICENSES
            dist/LGPL-2.1.txt
            dist/NOTICE
            dist/LGPL-2.1-SOURCE-OFFER.txt
            dist/OLDAP-2.8.txt
            dist/SHA256SUMS
            dist/SHA256SUMS.sig
            dist/SHA256SUMS.pem
