name: auditd-msgtype-check

# PR-time drift gate for the auditd msgtype name<->number tables (issue #476).
# Fail the build if crates/rulesteward-auditd/src/lints/value/msgtype.rs
# (MSGTYPE_NAMES / APPARMOR_MSGTYPE_NAMES) no longer matches upstream
# audit-userspace's lib/msg_typetab.h + lib/audit-records.h and the Linux
# kernel's include/uapi/linux/audit.h, at the refs pinned in
# tools/auditd-msgtype-update/msgtype-refs.toml.
#
# This gate runs OFFLINE, against the committed
# tools/auditd-msgtype-update/tests/fixtures/ (the pinned-ref upstream sources,
# sha256-verified when they were copied in). That is a deliberate reliability
# choice, mirroring fapolicyd-attr-check.yml: raw.githubusercontent.com is not
# a dependency a PR should block on. The offline gate catches the common case -
# a human edits msgtype.rs (or the tool's derivation logic) out of sync with
# the grounded upstream C/header source. The complementary weekly
# auditd-msgtype-drift.yml does the LIVE fetch against the pinned refs and
# opens an issue on drift (catching an upstream force-push of a pinned
# commit/tag, or a fixture that has itself drifted from real upstream).
#
# paths: is scoped to exactly the drift INPUTS so unrelated PRs never pay for
# this job:
#   - crates/rulesteward-auditd/src/lints/value/msgtype.rs - the shipped tables
#   - tools/auditd-msgtype-update/**                        - the tool + its
#                                                              fixtures +
#                                                              msgtype-refs.toml
#   - .github/workflows/auditd-msgtype-check.yml             - this workflow
on:
  pull_request:
    paths:
      - 'crates/rulesteward-auditd/src/lints/value/msgtype.rs'
      - 'tools/auditd-msgtype-update/**'
      - '.github/workflows/auditd-msgtype-check.yml'

# Least privilege: read the repo only. This job never writes back to GitHub
# (contrast auditd-msgtype-drift.yml, which needs issues: write for its
# tracking issue).
permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always

jobs:
  check:
    name: auditd msgtype tables drift vs committed upstream fixtures
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Install stable toolchain
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          # The tool is its own workspace; cache it separately from the main build.
          workspaces: tools/auditd-msgtype-update
      - name: Tool fmt + clippy
        # The tool is its own workspace, so `just ci` (--workspace) never lints it;
        # this is the tool's only CI lint enforcement.
        run: |
          set -euo pipefail
          cargo fmt --manifest-path tools/auditd-msgtype-update/Cargo.toml --all -- --check
          cargo clippy --manifest-path tools/auditd-msgtype-update/Cargo.toml \
            --all-targets --locked -- -D warnings
      - name: Tool tests (offline fixture-derivation + exit-code contract)
        run: cargo test --manifest-path tools/auditd-msgtype-update/Cargo.toml --locked
      - name: Offline drift gate (check --fixtures vs committed upstream fixtures)
        # `check` exits 0 on no drift, 1 on drift, 2 on a tool error; ALL non-zero
        # exits must hard-fail this job. No error swallowing.
        run: |
          set -euo pipefail
          cargo run --quiet --manifest-path tools/auditd-msgtype-update/Cargo.toml -- \
            check --fixtures tools/auditd-msgtype-update/tests/fixtures
