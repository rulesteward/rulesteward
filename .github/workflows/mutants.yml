name: mutants

on:
  schedule:
    - cron: "0 4 * * *"
  pull_request:
    types: [labeled]
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always

jobs:
  mutants:
    name: cargo-mutants (shard ${{ matrix.shard }}/8)
    # Gate the label-triggered path to a specific label so unrelated PRs
    # don't burn minutes here. The scheduled run has no label and is
    # always allowed; `workflow_dispatch` is manual-only and always allowed.
    if: >
      github.event_name == 'schedule' ||
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'pull_request' &&
       contains(github.event.pull_request.labels.*.name, 'run-mutants'))
    runs-on: [self-hosted, Linux, X64]
    timeout-minutes: 45
    strategy:
      # Shard the full mutant suite (~900 mutants) across the 8-runner pool so
      # the sweep finishes in one wave (~112 mutants/shard, ~18 min) instead of
      # running serially (~4.8h, which overran the 45-min ceiling).
      # fail-fast MUST stay false: a survivor (or any non-zero shard exit) must
      # not cancel its siblings -- otherwise the other shards' results are lost
      # and the run surfaces as "canceled".
      fail-fast: false
      matrix:
        # cargo-mutants shard index k is ZERO-BASED (valid range 0..n-1; it
        # enforces k < n). Shards 0/8..7/8 are a complete, disjoint partition;
        # a [1..8] list would error on 8/8 AND silently skip shard 0's mutants.
        shard: [0, 1, 2, 3, 4, 5, 6, 7]
    steps:
      - uses: actions/checkout@v6
      - name: Ensure rustup is available
        run: |
          if ! command -v rustup >/dev/null 2>&1; then
            sudo apt-get update && sudo apt-get install -y rustup
          fi
      - name: Install stable toolchain
        uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - uses: taiki-e/install-action@v2
        with:
          # Pin via the documented `tool: name@version` syntax. The action
          # has no separate `version` input; the `cargo-mutants@27.0.0` form
          # is the only way to lock the version. Otherwise the action installs
          # the latest, which silently absorbs CLI surface changes (PR #12
          # fixed the --error-on-survival removal in 27.x; this pin keeps
          # future major bumps from drifting in unobserved).
          # Bump deliberately when reviewing the mutation baseline.
          tool: cargo-mutants@27.0.0
      # Baseline + scope live in crates/rulesteward-fapolicyd/MUTATION-BASELINE.md
      # and .cargo/mutants.toml respectively. cargo-mutants 27+ exits non-zero
      # by default when a genuine survivor exists OR any test times out (the old
      # `--error-on-survival` flag was removed in 27.x; a timeout is exit code 3).
      # "Any survivor at all is a regression" remains the gate; bump only on
      # deliberate baseline review.
      #
      # --shard k/8       this runner's slice (k zero-based, 0..7).
      # --sharding round-robin  assign mutant i to shard i%8, so each file's
      #                   mutants spread across shards (vs `slice`, which would
      #                   pile one slow file's whole block onto a single shard).
      # -j2               2 cargo jobs on a 4-core/8GB runner (~2 cores + ~4GB
      #                   each) -- safe headroom; higher -j risks CPU-contention
      #                   spurious timeouts, which also fail the gate (exit 3).
      - name: cargo mutants
        run: cargo mutants --no-shuffle --shard ${{ matrix.shard }}/8 -j2 --sharding round-robin
