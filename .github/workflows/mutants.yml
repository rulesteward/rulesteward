name: mutants

on:
  schedule:
    - cron: "0 4 * * *"
  pull_request:
    types: [labeled]
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always

jobs:
  mutants:
    name: cargo-mutants (parser + lints)
    # Gate the label-triggered path to a specific label so unrelated PRs
    # don't burn minutes here. The scheduled run has no label and is
    # always allowed; `workflow_dispatch` is manual-only and always allowed.
    if: >
      github.event_name == 'schedule' ||
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'pull_request' &&
       contains(github.event.pull_request.labels.*.name, 'run-mutants'))
    runs-on: [self-hosted, Linux, X64]
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v5
      - name: Install stable toolchain
        run: |
          set -euxo pipefail
          curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs \
            | bash -s -- -y --profile minimal --default-toolchain stable
          echo "$HOME/.cargo/bin" >> "$GITHUB_PATH"
      - uses: Swatinem/rust-cache@v2
      - uses: taiki-e/install-action@v2
        with:
          # Pin via the documented `tool: name@version` syntax. The action
          # has no separate `version` input; the `cargo-mutants@27.0.0` form
          # is the only way to lock the version. Otherwise the action installs
          # the latest, which silently absorbs CLI surface changes (PR #12
          # fixed the --error-on-survival removal in 27.x; this pin keeps
          # future major bumps from drifting in unobserved).
          # Bump deliberately when reviewing the mutation baseline.
          tool: cargo-mutants@27.0.0
      # Baseline + scope live in crates/rulesteward-fapolicyd/MUTATION-BASELINE.md
      # and .cargo/mutants.toml respectively. cargo-mutants 27+ exits non-zero
      # by default when a genuine survivor exists (the old `--error-on-survival`
      # flag was removed in 27.x). "Any survivor at all is a regression"
      # remains the gate; bump only on deliberate baseline review.
      - name: cargo mutants
        run: cargo mutants --no-shuffle
