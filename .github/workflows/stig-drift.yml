name: stig-drift

# Weekly nudge: re-derive the sysctld STIG baselines from the LATEST ComplianceAsCode
# release and compare against the shipped tables. On drift, open/update a tracking
# issue (it never edits code). The on-demand path is `just stig-check-latest`.
on:
  schedule:
    - cron: "0 6 * * 1" # Mondays 06:00 UTC
  workflow_dispatch:

# Least privilege: read the code, and write issues (to open/update the drift tracker).
permissions:
  contents: read
  issues: write

env:
  CARGO_TERM_COLOR: always

jobs:
  drift:
    name: STIG baseline drift vs latest ComplianceAsCode
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - name: Install stable toolchain
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          # The tool is its own workspace; cache it separately from the main build.
          workspaces: tools/stig-update
      - name: Derive against latest upstream
        id: check
        run: |
          set +e
          cargo run --quiet --manifest-path tools/stig-update/Cargo.toml -- check --latest \
            > drift.txt 2> drift.err
          rc=$?
          echo "rc=$rc" >> "$GITHUB_OUTPUT"
          cat drift.err
          cat drift.txt
          # rc: 0 = no drift, 1 = drift (open issue), 2 = tool/upstream error (fail job).
          exit 0
      - name: Fail on tool error
        if: steps.check.outputs.rc == '2'
        run: |
          echo "stig-update errored against latest upstream (see logs above) - upstream may have" \
               "restructured; the tool needs a look." >&2
          exit 1
      - name: Open or update the drift tracking issue
        if: steps.check.outputs.rc == '1'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          gh label create stig-drift --color FBCA04 \
            --description "ComplianceAsCode STIG baseline drift" 2>/dev/null || true
          # Build the body in a FILE (cat copies drift.txt verbatim - no shell
          # expansion of the tool's output) and pass it via --body-file.
          {
            echo "The weekly \`stig-update check --latest\` found ComplianceAsCode/content changes"
            echo "vs the pinned refs in \`tools/stig-update/stig-refs.toml\`."
            echo
            echo "To update: run \`just stig-derive <product>\`, review the diff, paste the new"
            echo "\`k(...)\` lines into \`crates/rulesteward-sysctld/src/lints/baseline.rs\`, bump"
            echo "that product's ref in \`stig-refs.toml\`, re-gate (adversarial + mutation), and"
            echo "confirm \`just stig-check\` reports 0 drift."
            echo
            echo '```'
            cat drift.txt
            echo '```'
          } > issue-body.md
          existing="$(gh issue list --label stig-drift --state open --json number --jq '.[0].number // empty')"
          if [ -n "$existing" ]; then
            gh issue comment "$existing" --body-file issue-body.md
          else
            gh issue create --title "STIG baseline drift: ComplianceAsCode has updates" \
              --label stig-drift --body-file issue-body.md
          fi
