name: selinux-stig-drift

# Weekly nudge for the selinux se-W01/se-W02 STIG control-family table (issue #520):
# fetch the pinned DISA XCCDF zips LIVE and compare against the shipped table. On
# drift, open/update a tracking issue (it never edits code). The on-demand path is
# `just selinux-stig-check`.
#
# Unlike ComplianceAsCode, DISA has no releases/latest API - each RHEL STIG is
# versioned by FILENAME - so there is no `--latest` mode. This run derives at the
# PINNED zips (tools/selinux-stig-update/stig-refs.toml). It therefore catches:
#   - a DISA in-place re-publish of a pinned filename (rare but real),
#   - a DISA XCCDF reformat that breaks the parser (fail-closed -> the job fails),
#   - the committed fixtures having themselves drifted from live DISA.
# It CANNOT auto-detect a brand-new DISA revision (new filename); the issue body
# reminds a human to periodically check dl.dod.cyber.mil for a newer RHEL STIG.
#
# Cron slot: Thursday 07:00 UTC - offset from the Monday sysctld, Tuesday sshd, and
# Wednesday auditd stig-drift runs (auditd-stig-drift.yml's own comment notes
# Wed/Thu are free; this claims Thursday).
on:
  schedule:
    - cron: "0 7 * * 4" # Thursdays 07:00 UTC (offset from Mon sysctld / Tue sshd / Wed auditd)
  workflow_dispatch:

# Least privilege: read the code, and write issues (to open/update the drift tracker).
permissions:
  contents: read
  issues: write

env:
  CARGO_TERM_COLOR: always

jobs:
  drift:
    name: selinux STIG control table drift vs live pinned DISA XCCDF
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Install stable toolchain
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          # The tool is its own workspace; cache it separately from the main build.
          workspaces: tools/selinux-stig-update
      - name: Live check vs the pinned DISA zips
        id: check
        run: |
          set +e
          cargo run --quiet --manifest-path tools/selinux-stig-update/Cargo.toml -- check \
            > drift.txt 2> drift.err
          rc=$?
          echo "rc=$rc" >> "$GITHUB_OUTPUT"
          cat drift.err
          cat drift.txt
          # rc: 0 = no drift, 1 = drift (open issue). ANY other code (2 = tool/CDN
          # error, 101 = a `cargo run` compile failure if this out-of-workspace tool
          # drifts from the rulesteward-selinux public API, etc.) = fail the job loudly.
          exit 0
      - name: Fail on tool error
        if: steps.check.outputs.rc != '0' && steps.check.outputs.rc != '1'
        env:
          RC: ${{ steps.check.outputs.rc }}
        run: |
          echo "selinux-stig-update did not exit cleanly (rc=$RC; see logs above): the DISA CDN" \
               "may be unreachable, DISA may have reformatted the XCCDF and the parser failed" \
               "closed, or the tool may no longer compile against the rulesteward-selinux API." \
               "The tool needs a look." >&2
          exit 1
      - name: Open or update the drift tracking issue
        if: steps.check.outputs.rc == '1'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          gh label create selinux-stig-drift --color FBCA04 \
            --description "DISA selinux STIG control-table drift" 2>/dev/null || true
          # Build the body in a FILE (cat copies drift.txt verbatim - no shell
          # expansion of the tool's output) and pass it via --body-file.
          {
            echo "The weekly \`selinux-stig-update check\` found the shipped se-W01/se-W02"
            echo "STIG control table no longer matches the official DISA XCCDF at the pinned"
            echo "zips in \`tools/selinux-stig-update/stig-refs.toml\`."
            echo
            echo "To update: run \`just selinux-stig-derive <product>\`, review the diff, reconcile"
            echo "\`crates/rulesteward-selinux/src/stig.rs\` (the \`control_refs\` match arms),"
            echo "refresh the committed \`tools/selinux-stig-update/tests/fixtures/\` if the DISA"
            echo "Groups changed, re-gate (adversarial + mutation), and confirm"
            echo "\`just selinux-stig-check\` reports 0 drift."
            echo
            echo "NOTE: this run derives at the PINNED filenames. If DISA published a NEW revision"
            echo "(new filename), bump the \`zip\` values in \`stig-refs.toml\` first. Check"
            echo "dl.dod.cyber.mil for the current RHEL 8 / 9 / 10 STIG revisions."
            echo
            echo '```'
            cat drift.txt
            echo '```'
          } > issue-body.md
          existing="$(gh issue list --label selinux-stig-drift --state open --json number --jq '.[0].number // empty')"
          if [ -n "$existing" ]; then
            gh issue comment "$existing" --body-file issue-body.md
          else
            gh issue create --title "selinux STIG control table drift: DISA XCCDF has changes" \
              --label selinux-stig-drift --body-file issue-body.md
          fi
