name: ci

on:
  push:
    branches: ["**"]
  pull_request:

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1
  # Opt in to Node 24 for JavaScript actions ahead of the June 2026 default
  # flip. Without this, Node 20 actions emit deprecation warnings.
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  check:
    name: rocky${{ matrix.rocky }} — fmt + clippy + test + release-build
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        rocky: ["8", "9", "10"]
    container:
      # Use the rockylinux/rockylinux namespace — the legacy `rockylinux:10`
      # tag doesn't exist on Docker Hub. The new namespace works for 8/9/10.
      image: rockylinux/rockylinux:${{ matrix.rocky }}
    defaults:
      run:
        # Absolute path: don't depend on /bin/bash symlink or PATH in the
        # minimal rockylinux/rockylinux images.
        shell: /usr/bin/bash --noprofile --norc -eo pipefail {0}
    steps:
      # Bootstrap installs bash + tar (Swatinem/rust-cache needs tar) +
      # build toolchain. Runs via `/usr/bin/bash` (the rockylinux base ships
      # bash but may not have /bin/sh or /bin/bash symlinks).
      - name: Bootstrap (install bash, tar, gcc, openssl-devel, …)
        run: |
          dnf -y install bash tar gzip xz which findutils gcc gcc-c++ make git pkgconfig openssl-devel ca-certificates

      - uses: actions/checkout@v5

      - name: Install stable Rust toolchain via rustup
        run: |
          set -euxo pipefail
          curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs \
            | bash -s -- -y --profile minimal --default-toolchain stable --component rustfmt,clippy
          echo "$HOME/.cargo/bin" >> "$GITHUB_PATH"

      - uses: Swatinem/rust-cache@v2

      - name: cargo fmt --check
        run: cargo fmt --all --check

      - name: cargo clippy
        run: cargo clippy --workspace --all-targets --locked -- -D warnings

      - name: cargo test
        run: cargo test --workspace --locked

      - name: cargo build --release (rulesteward bin, glibc)
        run: cargo build --release --bin rulesteward --locked
