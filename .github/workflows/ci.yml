name: ci

# Cancel in-progress runs for the same ref when a new push arrives. On main
# we never cancel (each landed commit deserves its own full run); on PRs
# and feature branches we cancel stale runs so iterative pushes don't
# pile up consumed runner minutes.
#
# Note: the `${{ ... }}` expressions below are evaluated by GitHub's
# expression engine, NOT by a shell. They appear ONLY in YAML structural
# fields (group, cancel-in-progress, key, image, matrix), never in `run:`
# blocks - no shell-injection surface.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

# Trigger only on direct pushes to main and version tags. Feature-branch
# validation runs via the pull_request trigger - avoiding the prior
# push + pull_request double-fire that doubled CI minutes per PR push.
# Docs-only changes (markdown and docs/) are skipped via paths-ignore.
on:
  push:
    branches: [main]
    tags: ["v*"]
    paths-ignore:
      - '**.md'
      - 'docs/**'
  pull_request:
    paths-ignore:
      - '**.md'
      - 'docs/**'

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1
  # Opt in to Node 24 for JavaScript actions ahead of the June 2026 default
  # flip. Without this, Node 20 actions emit deprecation warnings.
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
  # Rocky 9/10 minimal images install /usr/bin/gcc but not the /usr/bin/cc
  # alternatives symlink. Force rustc to call gcc directly via absolute
  # path so PATH-lookup discrepancies in the linker exec don't bite us.
  CC: /usr/bin/gcc
  CARGO_TARGET_X86_64_UNKNOWN_LINUX_GNU_LINKER: /usr/bin/gcc

jobs:
  # Fast pre-flight: fmt + clippy on a single ubuntu host. Cheaper than
  # running them 3x inside the Rocky matrix containers. `check` and
  # `coverage` depend on this one directly; `musl-build` depends on
  # `check` (transitively waiting on fmt-clippy), so any fmt/clippy
  # failure short-circuits the whole pipeline before the heavier
  # matrix jobs spin up. `coverage` runs in parallel with `check` (not
  # gated on it) - llvm-cov reruns the tests so a `check` failure will
  # also fail coverage, but we accept the parallel-burn on red pushes
  # in exchange for ~8-10 min faster wall-clock on green pushes (the
  # common case).
  fmt-clippy:
    name: fmt + clippy (ubuntu)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      # dtolnay/rust-toolchain handles toolchain install + PATH declaratively.
      # It assumes `rustup` exists; GitHub-hosted ubuntu-latest ships it, so this
      # guard is a no-op there, but install it via apt as a safety net if absent.
      - name: Ensure rustup is available
        run: |
          if ! command -v rustup >/dev/null 2>&1; then
            sudo apt-get update && sudo apt-get install -y rustup
          fi
      - name: Install stable Rust toolchain (rustfmt + clippy)
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      # The authoritative-categorizer feature is now DEFAULT-ON (#124), so a
      # plain `cargo clippy --workspace --all-targets` compiles the vendored
      # libsepol C source via build.rs (needs `make` + a C compiler).
      - name: Install build deps (make, gcc)
        run: sudo apt-get update && sudo apt-get install -y make gcc

      - uses: Swatinem/rust-cache@v2
        with:
          key: ubuntu-fmt-clippy
          # Save only on push events (main + tag pushes); PR runs restore
          # the cache but skip the save phase. PR-save would re-snapshot
          # an essentially-identical target/ on each PR push, costing ~28s
          # per matrix entry for negligible incremental hit-rate gain.
          # The push-event save still updates the cache on every merge.
          save-if: ${{ github.event_name != 'pull_request' }}

      - name: cargo fmt --check
        run: cargo fmt --all --check

      - name: cargo clippy
        run: cargo clippy --workspace --all-targets --locked -- -D warnings

  # rocky-suite: per-Rocky test + musl smoke in a single container.
  # Previously two jobs (`check` + `musl-smoke`) shared the rocky 8/9/10
  # matrix, the dnf bootstrap, the bash shell override, and the
  # actions/checkout call. Merging eliminates 3 of the 6 matrix container
  # starts per CI run and shortens the critical path (the smoke add-on is
  # `./binary --help + grep`, dwarfed by the ~33 s dnf bootstrap and ~28 s
  # rust-cache restore already happening for the test step).
  #
  # Tradeoff vs. the prior shape: `musl-build` no longer waits on Rocky
  # tests, so a red push wastes ~38 s of musl-build compute that the prior
  # `needs: check` short-circuit would have saved. This is a small cost
  # in exchange for the wall-clock and CI-minutes win on the (common)
  # green path.
  check:
    name: ${{ matrix.label }} - test + musl smoke
    runs-on: ubuntu-latest
    needs: [fmt-clippy, musl-build]
    strategy:
      fail-fast: false
      matrix:
        # Tier-1 RHEL-family distros (spec sections 5.3 / 14.2). Rocky uses the
        # rockylinux/rockylinux namespace (the legacy `rockylinux:10` tag does
        # not exist on Docker Hub); AlmaLinux uses the official `almalinux`
        # image. Both are RHEL-ABI-compatible, so the same dnf bootstrap works.
        include:
          - { label: rocky8, image: "rockylinux/rockylinux:8" }
          - { label: rocky9, image: "rockylinux/rockylinux:9" }
          - { label: rocky10, image: "rockylinux/rockylinux:10" }
          - { label: alma8, image: "almalinux:8" }
          - { label: alma9, image: "almalinux:9" }
          - { label: alma10, image: "almalinux:10" }
    container:
      image: ${{ matrix.image }}
    defaults:
      run:
        # Absolute path: don't depend on /bin/bash symlink or PATH in the
        # minimal rockylinux/rockylinux images.
        shell: /usr/bin/bash --noprofile --norc -eo pipefail {0}
    steps:
      # Bootstrap: install everything needed by the rest of the job. Each
      # package is justified - drop any of them and a later step breaks.
      #   bash, tar, gzip, xz       - Swatinem/rust-cache needs tar+xz
      #   findutils                 - basic POSIX tools missing in :10
      #   gcc, glibc-devel, make    - rustc invokes the C toolchain as
      #                               linker (CC=gcc env var above bypasses
      #                               the missing /usr/bin/cc symlink).
      #   git                       - actions/checkout uses it post-clone
      #   ca-certificates           - rustup uses HTTPS
      # NOTE: `which`, `openssl-devel`, `pkgconfig` deliberately left out.
      # `which` was removed on RHEL 10 (use the bash builtin `command -v`);
      # `pkgconfig` was renamed to `pkgconf-pkg-config` on RHEL 10. dnf
      # aborts the entire transaction silently if any name fails to resolve,
      # which would leave the container without bash, tar, gcc, etc. Add
      # any of these back only with version-aware logic.
      # actions/cache@v5 needs `tar` in PATH to extract the cache archive.
      # The rockylinux/rockylinux base image does not reliably include tar
      # (the Bootstrap step below installs it as one of the 10 baseline
      # packages -- if it were already present, that install would be
      # redundant). Pre-install it via a tiny dnf call before the cache
      # action runs.
      #
      # Same dnf flags as the main Bootstrap step below, plus
      # --disablerepo=appstream: tar lives in BaseOS, so AppStream metadata
      # isn't needed for this single-package install. Skipping it saves
      # the AppStream repodata download on this preliminary step. The
      # main Bootstrap step still needs AppStream for gcc/glibc-devel/
      # make/git/ca-certificates so it can't disable that repo.
      - name: Pre-install tar (required by actions/cache)
        run: |
          dnf --disablerepo=extras --disablerepo=appstream --setopt=fastestmirror=True --setopt=keepcache=True --setopt=install_weak_deps=False --setopt=tsflags=nodocs -y install tar

      # Cache /var/cache/dnf across runs so the second-and-later runs skip
      # the package download phase. The cache survives because the bootstrap
      # step below passes --setopt=keepcache=True; without that flag dnf
      # deletes the RPMs after install and the cache is empty.
      #
      # Key strategy: any change to ci.yml invalidates the cache (the
      # package list is here). The restore-keys fallback lets a partial
      # cache from a prior ci.yml revision still seed most of the packages
      # so the worst case is a partial-miss, not a full miss.
      #
      # Path is the in-container path; actions/cache runs inside the
      # container when `container:` is set on the job, so this Just Works.
      - name: Restore dnf cache
        uses: actions/cache@v5
        with:
          path: /var/cache/dnf
          key: dnf-${{ matrix.label }}-${{ hashFiles('.github/workflows/ci.yml') }}
          restore-keys: |
            dnf-${{ matrix.label }}-

      - name: Bootstrap (install bash, tar, gcc, ...)
        # dnf tuning flags address slow CI installs:
        #
        # `--disablerepo=extras` skips the Extras repo's metadata download.
        # All 10 packages here live in BaseOS or AppStream (Extras carries
        # epel-release + a handful of unrelated utilities). The Extras
        # metadata download has been observed pulling at ~259 B/s in CI -
        # a stalled / rate-limited mirror that adds ~60 s of wall-clock
        # to every Rocky job. Disabling it eliminates that stall entirely.
        #
        # `--setopt=fastestmirror=True` tells dnf to probe mirrors for the
        # remaining enabled repos (BaseOS + AppStream) and pick the fastest
        # one per repo. BaseOS has been observed at ~910 kB/s on the
        # default mirror; probing typically lands a CDN-backed mirror that
        # is 5-10x faster, saving another ~30-50 s per Rocky job.
        #
        # `--setopt=keepcache=True` preserves the downloaded RPMs in
        # /var/cache/dnf after install. The default behavior deletes them
        # post-install; with keepcache the cache action above can save
        # them for the next run's restore.
        #
        # `--setopt=install_weak_deps=False` skips recommended/suggested
        # packages that dnf would otherwise pull in alongside the
        # explicit list. The 10-package list above is intentional; weak
        # deps would add a few more unneeded RPMs.
        #
        # `--setopt=tsflags=nodocs` skips installing documentation files
        # (man pages, /usr/share/doc/*). Saves a small amount of disk
        # I/O per package install with zero CI impact.
        run: |
          dnf --disablerepo=extras --setopt=fastestmirror=True --setopt=keepcache=True --setopt=install_weak_deps=False --setopt=tsflags=nodocs -y install bash tar gzip xz findutils gcc glibc-devel make git ca-certificates

      - uses: actions/checkout@v6

      - name: Install stable Rust toolchain via rustup
        run: |
          set -euxo pipefail
          curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs \
            | bash -s -- -y --profile minimal --default-toolchain stable
          echo "$HOME/.cargo/bin" >> "$GITHUB_PATH"
          # Also persist /usr/bin so rustc-spawned subprocesses (linker)
          # always find gcc, regardless of how GitHub re-assembles PATH.
          echo "/usr/bin" >> "$GITHUB_PATH"

      # Per-distro cache key - without this all six matrix entries race
      # to save the same key, so five of them log "Failed to save: Unable to
      # reserve cache" and only one distro/version's cache survives.
      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.label }}
          # Save only on push events; see fmt-clippy comment above.
          save-if: ${{ github.event_name != 'pull_request' }}

      - name: cargo test
        run: cargo test --workspace --locked
      # release-build step dropped: musl-build covers the release profile;
      # RuleSteward has no FFI / cfg-gated release-only paths that would surface a glibc-release-only bug.

      # Smoke section: the steps below were previously a separate `musl-smoke`
      # matrix job. Merged here so each Rocky container does test+smoke in one
      # provisioning cycle (the dnf bootstrap above already covers the
      # `bash + ca-certificates` superset that musl-smoke used to install
      # separately).
      - name: Download static musl binary from musl-build
        uses: actions/download-artifact@v8
        with:
          name: rulesteward-x86_64-linux-musl
          path: ./bin

      - name: Smoke -- the static musl binary runs on this Rocky
        run: |
          chmod +x ./bin/rulesteward
          ./bin/rulesteward --help
          ./bin/rulesteward --version

      - name: Smoke -- completions subcommand works on this Rocky
        run: |
          ./bin/rulesteward completions bash | head -5
          ./bin/rulesteward completions bash | grep -q '_rulesteward'

      - name: Functional smoke -- no placeholder leakage in --help
        # Capture --help output to a file FIRST, so a binary crash (non-zero
        # exit) fails the step under set -e instead of being masked by a
        # `|| true` swallow on the grep no-match branch.
        run: |
          ./bin/rulesteward --help > /tmp/help_output
          if grep -qE '<source>|<unknown>|<placeholder>|<TODO>|\bTODO\b|\bXXX\b|\bFIXME\b|panic|dbg!' /tmp/help_output; then
            grep -nE '<source>|<unknown>|<placeholder>|<TODO>|\bTODO\b|\bXXX\b|\bFIXME\b|panic|dbg!' /tmp/help_output
            exit 1
          fi

  coverage:
    name: cargo llvm-cov (workspace 80% + parser/lint 90%)
    runs-on: ubuntu-latest
    needs: fmt-clippy
    steps:
      - uses: actions/checkout@v6
      - name: Ensure rustup is available
        run: |
          if ! command -v rustup >/dev/null 2>&1; then
            sudo apt-get update && sudo apt-get install -y rustup
          fi
      - name: Install stable toolchain with llvm-tools
        uses: dtolnay/rust-toolchain@stable
        with:
          components: llvm-tools-preview
      # authoritative-categorizer is DEFAULT-ON (#124): llvm-cov --workspace
      # now compiles the vendored libsepol C source (needs `make` + a C compiler).
      - name: Install build deps (make, gcc)
        run: sudo apt-get update && sudo apt-get install -y make gcc
      - uses: Swatinem/rust-cache@v2
        with:
          # Save only on push events; see fmt-clippy comment above.
          save-if: ${{ github.event_name != 'pull_request' }}
      - uses: taiki-e/install-action@v2
        with:
          tool: cargo-llvm-cov
      # Collect coverage once (--no-report writes profdata but emits nothing),
      # then assert two floors from that same data via `report` (no re-run):
      #   1. an 80% workspace floor (unchanged from the prior single-command gate);
      #   2. the spec section 11 promise of >=90% lines on the parser + lint engine
      #      specifically -- rulesteward-core + rulesteward-fapolicyd. Incorrect lint
      #      results destroy operator trust, so this engine carries a higher bar than
      #      the workspace. Measured 2026-06-02 on the v0.1.0 tree: core 99.42%,
      #      fapolicyd 96.49%, combined 96.55% -- ample headroom over 90%.
      - name: Collect coverage (no report)
        run: cargo llvm-cov --no-report --workspace --locked
      - name: Assert workspace floor (>=80% lines)
        run: cargo llvm-cov report --fail-under-lines 80
      - name: Assert parser + lint floor (>=90% lines, spec section 11)
        run: cargo llvm-cov report --package rulesteward-core --package rulesteward-fapolicyd --package rulesteward-selinux --package rulesteward-auditd --fail-under-lines 90

  musl-build:
    name: build static musl binary (ubuntu)
    runs-on: ubuntu-latest
    # Depends on fmt-clippy only. The merged `check` job (test + smoke)
    # consumes this artifact and so depends on musl-build downstream; the
    # prior gate `needs: check` would now be a dependency cycle. A red push
    # wastes ~38 s of musl-build compute that the prior gate would have
    # saved, in exchange for the wall-clock win on green pushes.
    needs: fmt-clippy
    steps:
      - uses: actions/checkout@v6

      - name: Ensure rustup is available
        run: |
          if ! command -v rustup >/dev/null 2>&1; then
            sudo apt-get update && sudo apt-get install -y rustup
          fi
      - name: Install stable Rust + musl target
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-unknown-linux-musl

      # musl-tools provides musl-gcc (the musl target's C compiler/linker).
      # `make` + host `gcc` are additionally needed now that the release build is
      # DEFAULT-ON (#124) and compiles the vendored libsepol C source via build.rs
      # (libsepol's Makefile + host cc; musl-gcc is the per-target compiler).
      - name: Install build deps (make, gcc, musl-tools)
        run: sudo apt-get update && sudo apt-get install -y make gcc musl-tools

      - uses: Swatinem/rust-cache@v2
        with:
          key: ubuntu-musl
          # Save only on push events; see fmt-clippy comment above.
          save-if: ${{ github.event_name != 'pull_request' }}

      - name: cargo build --release --target x86_64-unknown-linux-musl
        env:
          CC_x86_64_unknown_linux_musl: musl-gcc
          CARGO_TARGET_X86_64_UNKNOWN_LINUX_MUSL_LINKER: musl-gcc
        run: cargo build --release --target x86_64-unknown-linux-musl --bin rulesteward --locked

      - name: Verify static linkage (the RED test)
        run: |
          file target/x86_64-unknown-linux-musl/release/rulesteward
          # musl + recent Rust produces "static-pie linked" (PIE = position-independent
          # executable, a security hardening feature). Both "statically linked" and
          # "static-pie linked" are fully static -- accept either form.
          file target/x86_64-unknown-linux-musl/release/rulesteward \
            | grep -qE "statically linked|static-pie linked"

      - name: Upload static binary as workflow artifact
        uses: actions/upload-artifact@v7
        with:
          name: rulesteward-x86_64-linux-musl
          path: target/x86_64-unknown-linux-musl/release/rulesteward
          retention-days: 7
          if-no-files-found: error

  # Cargo-audit: scan the workspace's Cargo.lock against the RustSec
  # advisory DB. Blocking gate: fails the PR check if any advisory
  # matches a crate in the workspace's dep tree. Independent of
  # fmt-clippy (no toolchain state shared); runs only on PR and
  # workflow_dispatch events per the if: gate below.
  audit:
    name: cargo-audit
    runs-on: ubuntu-latest
    # PR-only + manual: every change on this repo goes through a PR before
    # landing on main, so push-event audit would duplicate the PR signal.
    # workflow_dispatch is included so a maintainer can manually verify
    # advisory state after a cargo update without opening a PR.
    if: github.event_name == 'pull_request' || github.event_name == 'workflow_dispatch'
    # Blocking: a baseline run against the merged main confirmed zero
    # advisories (1098-entry DB, 120 deps, 0 vulnerabilities, 0 warnings).
    # New advisories that land on the project's dep tree now fail the
    # PR check rather than showing yellow. Reverting to warn-only is a
    # one-line change (`continue-on-error: true`) if the advisory feed
    # ever produces a false-positive that takes more than a day to
    # mitigate.
    steps:
      - uses: actions/checkout@v6
      # Install cargo-audit from prebuilt binaries via taiki-e/install-action.
      # The previous rustsec/audit-check@v2 wrapper installed via
      # `cargo install cargo-audit` which compiled the tool from source --
      # observed at ~3-5 min on every PR run. The taiki-e action uses
      # binstall + a published manifest to drop a prebuilt binary into
      # ~/.cargo/bin in ~10-20s. Pinned to a specific version for the
      # same drift-prevention reason cargo-mutants is pinned in mutants.yml.
      - uses: taiki-e/install-action@v2
        with:
          tool: cargo-audit@0.22.1
      - name: cargo audit
        run: cargo audit

  # Cargo-deny: scan the workspace's Cargo.lock against the configured
  # license allowlist, multi-version detection, and source registries
  # via deny.toml at the workspace root. Blocking gate: a baseline run
  # against the merged main confirmed zero issues (advisories ok, bans
  # ok, licenses ok, sources ok with cargo-deny 0.19.7). New license
  # entries / multiple-version regressions now fail the PR check.
  # Same install-action pattern as the audit job above: prebuilt binary
  # via taiki-e/install-action (~10-20s) instead of source-compile.
  deny:
    name: cargo-deny
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request' || github.event_name == 'workflow_dispatch'
    steps:
      - uses: actions/checkout@v6
      - uses: taiki-e/install-action@v2
        with:
          tool: cargo-deny@0.19.7
      - name: cargo deny check
        run: cargo deny check --config deny.toml

  # MSRV verification: build the workspace on the declared minimum
  # supported Rust version. Cargo.toml's rust-version = "1.88" floor
  # is only meaningful if CI actually exercises that toolchain;
  # without this job, a new use of a 1.89+ feature would slip in
  # silently and break downstream consumers pinned to 1.88. No
  # matrix: MSRV doesn't vary by distro, and the existing `check`
  # matrix covers per-distro behavior on stable.
  #
  # Floor is 1.88 (raised from 1.85): the workspace uses let-chains
  # (`if let .. && ..`, stabilized in 1.88) in rulesteward-fapolicyd,
  # and heed 0.22.1 calls `usize::is_multiple_of` (stabilized in 1.87).
  # A cold build below 1.88 fails with E0658; the prior "1.85" floor
  # only passed because rust-cache restored pre-built artifacts.
  msrv:
    name: cargo check on MSRV (1.88)
    runs-on: ubuntu-latest
    needs: fmt-clippy
    steps:
      - uses: actions/checkout@v6
      - name: Ensure rustup is available
        run: |
          if ! command -v rustup >/dev/null 2>&1; then
            sudo apt-get update && sudo apt-get install -y rustup
          fi
      - name: Install Rust 1.88 toolchain (MSRV)
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: "1.88"
      # authoritative-categorizer is DEFAULT-ON (#124): cargo check --workspace
      # now compiles the vendored libsepol C source (needs `make` + a C compiler).
      - name: Install build deps (make, gcc)
        run: sudo apt-get update && sudo apt-get install -y make gcc
      - uses: Swatinem/rust-cache@v2
        with:
          key: ubuntu-msrv-1.88
          # Save only on push events; see fmt-clippy comment above.
          save-if: ${{ github.event_name != 'pull_request' }}
      - name: cargo check (MSRV)
        run: cargo check --workspace --locked

  # ---------------------------------------------------------------------------
  # libsepol / authoritative-categorizer coverage (#120, #121)
  #
  # The opt-in `authoritative-categorizer` feature (the libsepol FFI in
  # rulesteward-selinux-sys + the categorize layer + the known-answer tests) is
  # default-OFF, so the jobs above never build or exercise it. These three jobs
  # close that gap. They build libsepol from the in-tree vendored source via
  # build.rs (`make` + a C compiler), so each installs `make`.
  # ---------------------------------------------------------------------------

  # Feature-enabled clippy + test, on BOTH the glibc host target and the musl
  # release target. The musl entry is the path the (opt-in) shipped binary would
  # actually use: musl-gcc + the Makefile's -DHAVE_REALLOCARRAY probe. Mirrors the
  # fmt-clippy ubuntu pattern.
  selinux-feature:
    name: ${{ matrix.label }} - authoritative-categorizer (clippy + test)
    runs-on: ubuntu-latest
    needs: fmt-clippy
    strategy:
      fail-fast: false
      matrix:
        include:
          - { label: "gnu", target: "x86_64-unknown-linux-gnu" }
          - { label: "musl", target: "x86_64-unknown-linux-musl" }
    env:
      # Used only by the musl entry's build.rs + linker; harmless on gnu.
      CC_x86_64_unknown_linux_musl: musl-gcc
      CARGO_TARGET_X86_64_UNKNOWN_LINUX_MUSL_LINKER: musl-gcc
    steps:
      - uses: actions/checkout@v6
      - name: Ensure rustup is available
        run: |
          if ! command -v rustup >/dev/null 2>&1; then
            sudo apt-get update && sudo apt-get install -y rustup
          fi
      - name: Install stable Rust toolchain (+ target, clippy)
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
          components: clippy
      # build.rs shells out to `make` + a C compiler to build vendored libsepol;
      # the musl target additionally needs musl-gcc (musl-tools).
      - name: Install build deps (make, gcc, musl-tools)
        run: sudo apt-get update && sudo apt-get install -y make gcc musl-tools
      - uses: Swatinem/rust-cache@v2
        with:
          key: selinux-feature-${{ matrix.label }}
          save-if: ${{ github.event_name != 'pull_request' }}
      # Lint the FFI shim + the categorize layer for BOTH targets (gnu + musl).
      # The default fmt-clippy job builds the workspace default (feature ON, gnu
      # host) so it does see the categorize layer, but this job adds the musl
      # target + the -sys `vendored` feature coverage that the host build skips.
      - name: clippy -p rulesteward-selinux-sys (vendored)
        run: cargo clippy -p rulesteward-selinux-sys --all-targets --features vendored --target ${{ matrix.target }} --locked -- -D warnings
      - name: clippy -p rulesteward-selinux (authoritative-categorizer)
        run: cargo clippy -p rulesteward-selinux --all-targets --features authoritative-categorizer --target ${{ matrix.target }} --locked -- -D warnings
      # The -sys build/link smoke (tests/links_from_source.rs) + the known-answer
      # oracle (rulesteward-selinux/tests/known_answer_categorize.rs), both built
      # against the from-source archive for this target.
      - name: test -p rulesteward-selinux-sys (vendored build/link smoke)
        run: cargo test -p rulesteward-selinux-sys --features vendored --target ${{ matrix.target }} --locked
      - name: test -p rulesteward-selinux (authoritative-categorizer KAT)
        run: cargo test -p rulesteward-selinux --features authoritative-categorizer --target ${{ matrix.target }} --locked

  # Feature-enabled coverage (glibc), explicitly forcing the feature on via
  # `--features rulesteward-selinux/authoritative-categorizer`. This job exists to
  # measure categorize.rs + the -sys FFI and hold the selinux >=90% floor with the
  # categorizer included. Non-gameable gate: turning the categorizer ON must not
  # drag the workspace below 80%, and rulesteward-selinux (now including
  # categorize.rs) must hold the spec section 11 >=90% floor (measured 2026-06-04:
  # workspace 92.1%, rulesteward-selinux 94.1%). The FFI-heavy
  # rulesteward-selinux-sys (~78%) is reported but NOT hard-floored: it is an
  # unsafe C-binding shim whose many error guards (LoadError / ReplayError paths)
  # are unreachable-in-practice; its real adequacy comes from the known-answer
  # replay + the build/link smoke, not a line %. (Coverage on the musl target is
  # intentionally skipped: instrumentation under cross adds no signal the gnu run
  # lacks.)
  selinux-feature-coverage:
    name: authoritative-categorizer coverage (ubuntu)
    runs-on: ubuntu-latest
    needs: fmt-clippy
    steps:
      - uses: actions/checkout@v6
      - name: Ensure rustup is available
        run: |
          if ! command -v rustup >/dev/null 2>&1; then
            sudo apt-get update && sudo apt-get install -y rustup
          fi
      - name: Install stable toolchain with llvm-tools
        uses: dtolnay/rust-toolchain@stable
        with:
          components: llvm-tools-preview
      - name: Install build deps (make, gcc)
        run: sudo apt-get update && sudo apt-get install -y make gcc
      - uses: Swatinem/rust-cache@v2
        with:
          key: selinux-feature-coverage
          save-if: ${{ github.event_name != 'pull_request' }}
      - uses: taiki-e/install-action@v2
        with:
          tool: cargo-llvm-cov
      - name: Collect coverage (feature on, no report)
        run: cargo llvm-cov --no-report --workspace --features rulesteward-selinux/authoritative-categorizer --locked
      - name: Assert workspace floor (>=80% lines, feature on)
        run: cargo llvm-cov report --fail-under-lines 80
      - name: Assert selinux floor (>=90% lines, incl. categorize.rs)
        run: cargo llvm-cov report --package rulesteward-selinux --fail-under-lines 90
      - name: Report selinux-sys FFI shim coverage (informational, not floored)
        run: cargo llvm-cov report --package rulesteward-selinux-sys

  # Standalone: build libsepol.a from the vendored source by ITSELF, off the
  # shipped-binary critical path (independent, like audit/deny). Proves the
  # vendored C compiles to a static archive that exports the symbols the FFI shim
  # calls, without involving cargo or the Rust crate. No checksum yet (#120 defers
  # it until byte-reproducibility is established).
  libsepol-from-source:
    name: build libsepol.a from vendored source (standalone)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Install musl toolchain + make + binutils
        run: sudo apt-get update && sudo apt-get install -y musl-tools make gcc binutils
      - name: Build libsepol.a from vendored source (musl)
        run: |
          set -euxo pipefail
          rm -rf /tmp/lsbuild
          cp -r crates/rulesteward-selinux-sys/vendor/libsepol /tmp/lsbuild
          make -C /tmp/lsbuild/src libsepol.a \
            CC=musl-gcc DISABLE_CIL=y DISABLE_SHARED=y \
            CFLAGS="-I. -I../include -D_GNU_SOURCE -O2 -fno-semantic-interposition -fPIC"
      - name: Assert archive produced + exports the called symbols
        run: |
          set -euxo pipefail
          test -f /tmp/lsbuild/src/libsepol.a
          ar t /tmp/lsbuild/src/libsepol.a | grep -qx 'services.o'
          for s in sepol_compute_av_reason_buffer sepol_policydb_read \
                   policydb_load_isids sepol_context_to_sid \
                   sepol_policydb_create sepol_policydb_free; do
            nm /tmp/lsbuild/src/libsepol.a | grep -qE " T $s\$" \
              || { echo "missing exported symbol: $s"; exit 1; }
          done

  # The clean Apache-2.0-only build (#124, #110). The `authoritative-categorizer`
  # feature is DEFAULT-ON, so a plain workspace build links the LGPL-2.1 libsepol;
  # `--no-default-features` is the ONLY libsepol-free build and the one downstreams
  # who want an Apache-2.0-only artifact use. This job GUARDS that build path: it
  # deliberately does NOT install make/gcc, so if any libsepol C source ever leaks
  # into the no-default-features dep graph the build fails (the regression we want
  # to catch). It builds, lints, and tests rulesteward-cli with the feature off.
  apache-only-build:
    name: apache-2.0-only build (no libsepol, no-default-features)
    runs-on: ubuntu-latest
    needs: fmt-clippy
    steps:
      - uses: actions/checkout@v6
      - name: Ensure rustup is available
        run: |
          if ! command -v rustup >/dev/null 2>&1; then
            sudo apt-get update && sudo apt-get install -y rustup
          fi
      - name: Install stable Rust toolchain (+ clippy)
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      # NOTE: NO make/gcc install on purpose. The whole point of this job is that
      # the no-default-features build is libsepol-free and must compile without a
      # C toolchain for the vendored libsepol. If it ever needs make/gcc, libsepol
      # has leaked into the Apache-2.0-only build -- that is the failure to catch.
      - uses: Swatinem/rust-cache@v2
        with:
          key: apache-only-build
          save-if: ${{ github.event_name != 'pull_request' }}
      - name: cargo build (no libsepol)
        run: cargo build -p rulesteward-cli --no-default-features --locked
      - name: cargo clippy (no libsepol)
        run: cargo clippy -p rulesteward-cli --no-default-features --all-targets --locked -- -D warnings
      - name: cargo test (no libsepol)
        run: cargo test -p rulesteward-cli --no-default-features --locked
