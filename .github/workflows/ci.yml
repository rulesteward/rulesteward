name: ci

# Cancel in-progress runs for the same ref when a new push arrives. On main
# we never cancel (each landed commit deserves its own full run); on PRs
# and feature branches we cancel stale runs so iterative pushes don't
# pile up consumed runner minutes.
#
# Note: the `${{ ... }}` expressions below are evaluated by GitHub's
# expression engine, NOT by a shell. They appear ONLY in YAML structural
# fields (group, cancel-in-progress, key, image, matrix), never in `run:`
# blocks - no shell-injection surface.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

# Trigger only on direct pushes to main and version tags. Feature-branch
# validation runs via the pull_request trigger - avoiding the prior
# push + pull_request double-fire that doubled CI minutes per PR push.
# Docs-only changes (markdown and docs/) are skipped via paths-ignore.
on:
  push:
    branches: [main]
    tags: ["v*"]
    paths-ignore:
      - '**.md'
      - 'docs/**'
  pull_request:
    paths-ignore:
      - '**.md'
      - 'docs/**'

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1
  # Opt in to Node 24 for JavaScript actions ahead of the June 2026 default
  # flip. Without this, Node 20 actions emit deprecation warnings.
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
  # Rocky 9/10 minimal images install /usr/bin/gcc but not the /usr/bin/cc
  # alternatives symlink. Force rustc to call gcc directly via absolute
  # path so PATH-lookup discrepancies in the linker exec don't bite us.
  CC: /usr/bin/gcc
  CARGO_TARGET_X86_64_UNKNOWN_LINUX_GNU_LINKER: /usr/bin/gcc

jobs:
  # Fast pre-flight: fmt + clippy on a single ubuntu host. Cheaper than
  # running them 3x inside the Rocky matrix containers. `check` and
  # `coverage` depend on this one directly; `musl-build` depends on
  # `check` (transitively waiting on fmt-clippy), so any fmt/clippy
  # failure short-circuits the whole pipeline before the heavier
  # matrix jobs spin up. `coverage` runs in parallel with `check` (not
  # gated on it) - llvm-cov reruns the tests so a `check` failure will
  # also fail coverage, but we accept the parallel-burn on red pushes
  # in exchange for ~8-10 min faster wall-clock on green pushes (the
  # common case).
  fmt-clippy:
    name: fmt + clippy (ubuntu)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Install stable Rust toolchain (rustfmt + clippy)
        run: |
          set -euxo pipefail
          curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs \
            | bash -s -- -y --profile minimal --default-toolchain stable --component rustfmt,clippy
          echo "$HOME/.cargo/bin" >> "$GITHUB_PATH"

      - uses: Swatinem/rust-cache@v2
        with:
          key: ubuntu-fmt-clippy
          # Save only on push events (main + tag pushes); PR runs restore
          # the cache but skip the save phase. PR-save would re-snapshot
          # an essentially-identical target/ on each PR push, costing ~28s
          # per matrix entry for negligible incremental hit-rate gain.
          # The push-event save still updates the cache on every merge.
          save-if: ${{ github.event_name != 'pull_request' }}

      - name: cargo fmt --check
        run: cargo fmt --all --check

      - name: cargo clippy
        run: cargo clippy --workspace --all-targets --locked -- -D warnings

  # rocky-suite: per-Rocky test + musl smoke in a single container.
  # Previously two jobs (`check` + `musl-smoke`) shared the rocky 8/9/10
  # matrix, the dnf bootstrap, the bash shell override, and the
  # actions/checkout call. Merging eliminates 3 of the 6 matrix container
  # starts per CI run and shortens the critical path (the smoke add-on is
  # `./binary --help + grep`, dwarfed by the ~33 s dnf bootstrap and ~28 s
  # rust-cache restore already happening for the test step).
  #
  # Tradeoff vs. the prior shape: `musl-build` no longer waits on Rocky
  # tests, so a red push wastes ~38 s of musl-build compute that the prior
  # `needs: check` short-circuit would have saved. This is a small cost
  # in exchange for the wall-clock and CI-minutes win on the (common)
  # green path.
  check:
    name: rocky${{ matrix.rocky }} - test + musl smoke
    runs-on: ubuntu-latest
    needs: [fmt-clippy, musl-build]
    strategy:
      fail-fast: false
      matrix:
        rocky: ["8", "9", "10"]
    container:
      # Use the rockylinux/rockylinux namespace - the legacy `rockylinux:10`
      # tag doesn't exist on Docker Hub. The new namespace works for 8/9/10.
      image: rockylinux/rockylinux:${{ matrix.rocky }}
    defaults:
      run:
        # Absolute path: don't depend on /bin/bash symlink or PATH in the
        # minimal rockylinux/rockylinux images.
        shell: /usr/bin/bash --noprofile --norc -eo pipefail {0}
    steps:
      # Bootstrap: install everything needed by the rest of the job. Each
      # package is justified - drop any of them and a later step breaks.
      #   bash, tar, gzip, xz       - Swatinem/rust-cache needs tar+xz
      #   findutils                 - basic POSIX tools missing in :10
      #   gcc, glibc-devel, make    - rustc invokes the C toolchain as
      #                               linker (CC=gcc env var above bypasses
      #                               the missing /usr/bin/cc symlink).
      #   git                       - actions/checkout uses it post-clone
      #   ca-certificates           - rustup uses HTTPS
      # NOTE: `which`, `openssl-devel`, `pkgconfig` deliberately left out.
      # `which` was removed on RHEL 10 (use the bash builtin `command -v`);
      # `pkgconfig` was renamed to `pkgconf-pkg-config` on RHEL 10. dnf
      # aborts the entire transaction silently if any name fails to resolve,
      # which would leave the container without bash, tar, gcc, etc. Add
      # any of these back only with version-aware logic.
      # actions/cache@v4 needs `tar` in PATH to extract the cache archive.
      # The rockylinux/rockylinux base image does not reliably include tar
      # (the Bootstrap step below installs it as one of the 10 baseline
      # packages -- if it were already present, that install would be
      # redundant). Pre-install it via a tiny dnf call before the cache
      # action runs.
      #
      # Same dnf flags as the main Bootstrap step below, plus
      # --disablerepo=appstream: tar lives in BaseOS, so AppStream metadata
      # isn't needed for this single-package install. Skipping it saves
      # the AppStream repodata download on this preliminary step. The
      # main Bootstrap step still needs AppStream for gcc/glibc-devel/
      # make/git/ca-certificates so it can't disable that repo.
      - name: Pre-install tar (required by actions/cache)
        run: |
          dnf --disablerepo=extras --disablerepo=appstream --setopt=fastestmirror=True --setopt=keepcache=True --setopt=install_weak_deps=False --setopt=tsflags=nodocs -y install tar

      # Cache /var/cache/dnf across runs so the second-and-later runs skip
      # the package download phase. The cache survives because the bootstrap
      # step below passes --setopt=keepcache=True; without that flag dnf
      # deletes the RPMs after install and the cache is empty.
      #
      # Key strategy: any change to ci.yml invalidates the cache (the
      # package list is here). The restore-keys fallback lets a partial
      # cache from a prior ci.yml revision still seed most of the packages
      # so the worst case is a partial-miss, not a full miss.
      #
      # Path is the in-container path; actions/cache runs inside the
      # container when `container:` is set on the job, so this Just Works.
      - name: Restore dnf cache
        uses: actions/cache@v4
        with:
          path: /var/cache/dnf
          key: dnf-${{ matrix.rocky }}-${{ hashFiles('.github/workflows/ci.yml') }}
          restore-keys: |
            dnf-${{ matrix.rocky }}-

      - name: Bootstrap (install bash, tar, gcc, ...)
        # dnf tuning flags address slow CI installs:
        #
        # `--disablerepo=extras` skips the Extras repo's metadata download.
        # All 10 packages here live in BaseOS or AppStream (Extras carries
        # epel-release + a handful of unrelated utilities). The Extras
        # metadata download has been observed pulling at ~259 B/s in CI -
        # a stalled / rate-limited mirror that adds ~60 s of wall-clock
        # to every Rocky job. Disabling it eliminates that stall entirely.
        #
        # `--setopt=fastestmirror=True` tells dnf to probe mirrors for the
        # remaining enabled repos (BaseOS + AppStream) and pick the fastest
        # one per repo. BaseOS has been observed at ~910 kB/s on the
        # default mirror; probing typically lands a CDN-backed mirror that
        # is 5-10x faster, saving another ~30-50 s per Rocky job.
        #
        # `--setopt=keepcache=True` preserves the downloaded RPMs in
        # /var/cache/dnf after install. The default behavior deletes them
        # post-install; with keepcache the cache action above can save
        # them for the next run's restore.
        #
        # `--setopt=install_weak_deps=False` skips recommended/suggested
        # packages that dnf would otherwise pull in alongside the
        # explicit list. The 10-package list above is intentional; weak
        # deps would add a few more unneeded RPMs.
        #
        # `--setopt=tsflags=nodocs` skips installing documentation files
        # (man pages, /usr/share/doc/*). Saves a small amount of disk
        # I/O per package install with zero CI impact.
        run: |
          dnf --disablerepo=extras --setopt=fastestmirror=True --setopt=keepcache=True --setopt=install_weak_deps=False --setopt=tsflags=nodocs -y install bash tar gzip xz findutils gcc glibc-devel make git ca-certificates

      - uses: actions/checkout@v5

      - name: Install stable Rust toolchain via rustup
        run: |
          set -euxo pipefail
          curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs \
            | bash -s -- -y --profile minimal --default-toolchain stable
          echo "$HOME/.cargo/bin" >> "$GITHUB_PATH"
          # Also persist /usr/bin so rustc-spawned subprocesses (linker)
          # always find gcc, regardless of how GitHub re-assembles PATH.
          echo "/usr/bin" >> "$GITHUB_PATH"

      # Per-Rocky cache key - without this all three matrix entries race
      # to save the same key, so two of them log "Failed to save: Unable to
      # reserve cache" and only one Rocky version's cache survives.
      - uses: Swatinem/rust-cache@v2
        with:
          key: rocky${{ matrix.rocky }}
          # Save only on push events; see fmt-clippy comment above.
          save-if: ${{ github.event_name != 'pull_request' }}

      - name: cargo test
        run: cargo test --workspace --locked
      # release-build step dropped: musl-build covers the release profile;
      # RuleSteward has no FFI / cfg-gated release-only paths that would surface a glibc-release-only bug.

      # Smoke section: the steps below were previously a separate `musl-smoke`
      # matrix job. Merged here so each Rocky container does test+smoke in one
      # provisioning cycle (the dnf bootstrap above already covers the
      # `bash + ca-certificates` superset that musl-smoke used to install
      # separately).
      - name: Download static musl binary from musl-build
        uses: actions/download-artifact@v4
        with:
          name: rulesteward-x86_64-linux-musl
          path: ./bin

      - name: Smoke -- the static musl binary runs on this Rocky
        run: |
          chmod +x ./bin/rulesteward
          ./bin/rulesteward --help
          ./bin/rulesteward --version

      - name: Smoke -- completions subcommand works on this Rocky
        run: |
          ./bin/rulesteward completions bash | head -5
          ./bin/rulesteward completions bash | grep -q '_rulesteward'

      - name: Functional smoke -- no placeholder leakage in --help
        # Capture --help output to a file FIRST, so a binary crash (non-zero
        # exit) fails the step under set -e instead of being masked by a
        # `|| true` swallow on the grep no-match branch.
        run: |
          ./bin/rulesteward --help > /tmp/help_output
          if grep -qE '<source>|<unknown>|<placeholder>|<TODO>|\bTODO\b|\bXXX\b|\bFIXME\b|panic|dbg!' /tmp/help_output; then
            grep -nE '<source>|<unknown>|<placeholder>|<TODO>|\bTODO\b|\bXXX\b|\bFIXME\b|panic|dbg!' /tmp/help_output
            exit 1
          fi

  coverage:
    name: cargo llvm-cov (floor 80%)
    runs-on: ubuntu-latest
    needs: fmt-clippy
    steps:
      - uses: actions/checkout@v5
      - name: Install stable toolchain with llvm-tools
        run: |
          set -euxo pipefail
          curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs \
            | bash -s -- -y --profile minimal --default-toolchain stable --component llvm-tools-preview
          echo "$HOME/.cargo/bin" >> "$GITHUB_PATH"
      - uses: Swatinem/rust-cache@v2
        with:
          # Save only on push events; see fmt-clippy comment above.
          save-if: ${{ github.event_name != 'pull_request' }}
      - uses: taiki-e/install-action@v2
        with:
          tool: cargo-llvm-cov
      - name: cargo llvm-cov --workspace --fail-under-lines 80
        run: cargo llvm-cov --workspace --locked --fail-under-lines 80

  musl-build:
    name: build static musl binary (ubuntu)
    runs-on: ubuntu-latest
    # Depends on fmt-clippy only. The merged `check` job (test + smoke)
    # consumes this artifact and so depends on musl-build downstream; the
    # prior gate `needs: check` would now be a dependency cycle. A red push
    # wastes ~38 s of musl-build compute that the prior gate would have
    # saved, in exchange for the wall-clock win on green pushes.
    needs: fmt-clippy
    steps:
      - uses: actions/checkout@v5

      - name: Install stable Rust + musl target
        run: |
          set -euxo pipefail
          curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs \
            | bash -s -- -y --profile minimal --default-toolchain stable
          echo "$HOME/.cargo/bin" >> "$GITHUB_PATH"
          ~/.cargo/bin/rustup target add x86_64-unknown-linux-musl

      - name: Install musl-tools (provides musl-gcc)
        run: sudo apt-get update && sudo apt-get install -y musl-tools

      - uses: Swatinem/rust-cache@v2
        with:
          key: ubuntu-musl
          # Save only on push events; see fmt-clippy comment above.
          save-if: ${{ github.event_name != 'pull_request' }}

      - name: cargo build --release --target x86_64-unknown-linux-musl
        env:
          CC_x86_64_unknown_linux_musl: musl-gcc
          CARGO_TARGET_X86_64_UNKNOWN_LINUX_MUSL_LINKER: musl-gcc
        run: cargo build --release --target x86_64-unknown-linux-musl --bin rulesteward --locked

      - name: Verify static linkage (the RED test)
        run: |
          file target/x86_64-unknown-linux-musl/release/rulesteward
          # musl + recent Rust produces "static-pie linked" (PIE = position-independent
          # executable, a security hardening feature). Both "statically linked" and
          # "static-pie linked" are fully static -- accept either form.
          file target/x86_64-unknown-linux-musl/release/rulesteward \
            | grep -qE "statically linked|static-pie linked"

      - name: Upload static binary as workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: rulesteward-x86_64-linux-musl
          path: target/x86_64-unknown-linux-musl/release/rulesteward
          retention-days: 7
          if-no-files-found: error

  # Cargo-audit: scan the workspace's Cargo.lock against the RustSec
  # advisory DB. First-iteration warn-only via continue-on-error so a
  # brand-new advisory dropping the day this lands shows yellow rather
  # than blocking main. A follow-up PR flips to blocking once a clean
  # baseline run is observed. Independent of fmt-clippy: no toolchain
  # state shared.
  audit:
    name: cargo-audit (warn-only)
    runs-on: ubuntu-latest
    # PR-only + manual: the action's value on this project is the check
    # annotation in the PR's check column, where new advisories surface
    # during review. On push/tag events the action would create tracking
    # Issues, but every change on this repo goes through a PR before
    # landing on main, so the push-event path would only duplicate work.
    # workflow_dispatch is included so a maintainer can manually verify
    # advisory state after a cargo update without opening a PR.
    if: github.event_name == 'pull_request' || github.event_name == 'workflow_dispatch'
    continue-on-error: true
    # rustsec/audit-check creates GitHub Check Runs on pull_request events
    # (and Issues on schedule/push events). Without checks: write the action
    # falls back to stdout-only and no annotation appears in the PR checks
    # column -- which defeats most of the continue-on-error UX. Grant the
    # minimum required permissions explicitly so behaviour is deterministic
    # regardless of the repo's default GITHUB_TOKEN permission setting.
    permissions:
      contents: read
      checks: write
    steps:
      - uses: actions/checkout@v5
      - uses: rustsec/audit-check@v2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

  # MSRV verification: build the workspace on the declared minimum
  # supported Rust version. Cargo.toml's rust-version = "1.85" floor
  # is only meaningful if CI actually exercises that toolchain;
  # without this job, a new use of a 1.86+ feature would slip in
  # silently and break downstream consumers pinned to 1.85. No
  # matrix: MSRV doesn't vary by distro, and the existing `check`
  # matrix covers per-distro behavior on stable.
  msrv:
    name: cargo check on MSRV (1.85)
    runs-on: ubuntu-latest
    needs: fmt-clippy
    steps:
      - uses: actions/checkout@v5
      - name: Install Rust 1.85 toolchain
        run: |
          set -euxo pipefail
          curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs \
            | bash -s -- -y --profile minimal --default-toolchain 1.85
          echo "$HOME/.cargo/bin" >> "$GITHUB_PATH"
      - uses: Swatinem/rust-cache@v2
        with:
          key: ubuntu-msrv-1.85
          # Save only on push events; see fmt-clippy comment above.
          save-if: ${{ github.event_name != 'pull_request' }}
      - name: cargo check (MSRV)
        run: cargo check --workspace --locked
