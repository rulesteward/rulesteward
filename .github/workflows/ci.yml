name: ci

on:
  push:
    branches: ["**"]
  pull_request:

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1
  # Opt in to Node 24 for JavaScript actions ahead of the June 2026 default
  # flip. Without this, Node 20 actions emit deprecation warnings.
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  check:
    name: rocky${{ matrix.rocky }} — fmt + clippy + test + release-build
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        rocky: ["8", "9", "10"]
    container:
      # Use the rockylinux/rockylinux namespace — the legacy `rockylinux:10`
      # tag doesn't exist on Docker Hub. The new namespace works for 8/9/10.
      image: rockylinux/rockylinux:${{ matrix.rocky }}
    defaults:
      run:
        # Absolute path: don't depend on /bin/bash symlink or PATH in the
        # minimal rockylinux/rockylinux images.
        shell: /usr/bin/bash --noprofile --norc -eo pipefail {0}
    steps:
      # Bootstrap: install everything needed by the rest of the job. Each
      # package is justified — drop any of them and a later step breaks.
      #   bash, tar, gzip, xz       — Swatinem/rust-cache needs tar+xz
      #   findutils, which          — basic POSIX tools missing in :10
      #   gcc, glibc-devel, make    — rustc's default linker is `cc` which
      #                               on Rocky comes from the `gcc` package
      #                               via the alternatives system. We also
      #                               create the symlink defensively below
      #                               since :9/:10 minimal images skip it.
      #   git                       — actions/checkout uses it post-clone
      #   ca-certificates           — rustup uses HTTPS
      # NOTE: openssl-devel and pkgconfig deliberately left out — no native
      # deps in the workspace yet. Adding either to the list on Rocky 10
      # may trip the `pkgconfig` -> `pkgconf-pkg-config` rename and fail the
      # whole transaction silently. Add back when we pull in a `-sys` crate.
      - name: Bootstrap (install bash, tar, gcc, …)
        run: |
          dnf -y install bash tar gzip xz findutils which gcc glibc-devel make git ca-certificates
          # Create /usr/bin/cc -> gcc symlink if the alternatives system
          # didn't (true on Rocky 9/10 minimal images).
          if [ ! -e /usr/bin/cc ]; then ln -s gcc /usr/bin/cc; fi
          # Sanity-check everything the cache action + rustc need.
          for bin in bash tar gzip xz gcc cc make git; do
            command -v "$bin" || { echo "MISSING: $bin"; exit 1; }
          done

      - uses: actions/checkout@v5

      - name: Install stable Rust toolchain via rustup
        run: |
          set -euxo pipefail
          curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs \
            | bash -s -- -y --profile minimal --default-toolchain stable --component rustfmt,clippy
          echo "$HOME/.cargo/bin" >> "$GITHUB_PATH"

      - uses: Swatinem/rust-cache@v2

      - name: cargo fmt --check
        run: cargo fmt --all --check

      - name: cargo clippy
        run: cargo clippy --workspace --all-targets --locked -- -D warnings

      - name: cargo test
        run: cargo test --workspace --locked

      - name: cargo build --release (rulesteward bin, glibc)
        run: cargo build --release --bin rulesteward --locked
