name: ci

on:
  push:
    branches: ["**"]
  pull_request:

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  check:
    name: rocky${{ matrix.rocky }} — fmt + clippy + test + release-build
    # `runs-on` is the HOST runner (GitHub only offers ubuntu/windows/macos
    # hosts). `container:` is the image the job actually runs inside, so all
    # `cargo`/`dnf`/`gcc` invocations execute on Rocky.
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        rocky: ["8", "9", "10"]
    container:
      image: rockylinux:${{ matrix.rocky }}
    steps:
      - name: Install base tooling
        shell: bash
        run: |
          set -euxo pipefail
          if command -v dnf >/dev/null 2>&1; then PKG=dnf; else PKG=yum; fi
          $PKG -y install gcc gcc-c++ make git pkgconfig openssl-devel ca-certificates curl

      - uses: actions/checkout@v4

      - name: Install stable Rust toolchain via rustup
        shell: bash
        run: |
          set -euxo pipefail
          curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs \
            | sh -s -- -y --profile minimal --default-toolchain stable --component rustfmt,clippy
          echo "$HOME/.cargo/bin" >> "$GITHUB_PATH"

      - uses: Swatinem/rust-cache@v2

      - name: cargo fmt --check
        run: cargo fmt --all --check

      - name: cargo clippy
        run: cargo clippy --workspace --all-targets --locked -- -D warnings

      - name: cargo test
        run: cargo test --workspace --locked

      - name: cargo build --release (rulesteward bin, glibc)
        run: cargo build --release --bin rulesteward --locked
