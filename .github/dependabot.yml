version: 2

# Monthly cadence for both ecosystems. The 80% line-coverage floor +
# cargo-mutants survivor gate + cargo-audit baseline catch most upgrade
# regressions before merge. Weekly cadence would generate PR noise that
# a solo-dev project can't absorb; monthly batches dep PRs into a
# reviewable cluster.

updates:
  - package-ecosystem: "cargo"
    directory: "/"
    schedule:
      interval: "monthly"
      day: "monday"
    open-pull-requests-limit: 5
    groups:
      production-dependencies:
        dependency-type: "production"
        update-types:
          - "minor"
          - "patch"
      development-dependencies:
        dependency-type: "development"
        update-types:
          - "minor"
          - "patch"

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "monthly"
      day: "monday"
    open-pull-requests-limit: 3
    groups:
      actions-patch-minor:
        update-types:
          - "minor"
          - "patch"
