version: 2

# Monthly cadence for both ecosystems. The 80% line-coverage floor +
# cargo-mutants survivor gate + cargo-audit baseline catch most upgrade
# regressions before merge. Weekly cadence would generate PR noise that
# a solo-dev project can't absorb; monthly batches dep PRs into a
# reviewable cluster.

updates:
  - package-ecosystem: "cargo"
    directory: "/"
    schedule:
      interval: "monthly"
      day: "monday"
    open-pull-requests-limit: 5
    groups:
      # The RustCrypto hash crates (sha1/sha2/md-5) share a transitive `digest`
      # major and are unified through one generic in rulesteward-fapolicyd, so
      # they MUST move together: bumping one alone splits the `digest` graph and
      # fails to compile. Listed first (first matching group wins) and includes
      # "major" so a 0.x->0.x break arrives as one mergeable PR, not three broken
      # ones (see PRs #54/#56/#57).
      rustcrypto-hashes:
        patterns:
          - "sha1"
          - "sha2"
          - "md-5"
        update-types:
          - "major"
          - "minor"
          - "patch"
      production-dependencies:
        dependency-type: "production"
        update-types:
          - "minor"
          - "patch"
      development-dependencies:
        dependency-type: "development"
        update-types:
          - "minor"
          - "patch"

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "monthly"
      day: "monday"
    open-pull-requests-limit: 3
    groups:
      actions-patch-minor:
        update-types:
          - "minor"
          - "patch"
